<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>병원 관리 대시보드 — Medvo</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E🦷%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/common.css">
  <style>
    body { background: var(--bg-base); }
    .clinic-container { max-width: 700px; margin: 0 auto; padding: 24px; display: block !important; }

    /* 🔐 인증 모달 숨김 */
    #clinicAuthModal { display: none !important; opacity: 0 !important; pointer-events: none !important; }
    #clinicAuthModal.hidden { opacity: 0 !important; pointer-events: none !important; display: none !important; }

    .clinic-header {
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      color: white;
      padding: 32px 24px;
      border-radius: var(--radius-lg);
      margin-bottom: 28px;
    }

    .clinic-header h1 { font-size: 2rem; margin: 0 0 8px 0; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
    .clinic-header p { margin: 4px 0; opacity: 1; font-weight: 500; }

    .clinic-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .info-card {
      background: rgba(255, 255, 255, 0.15);
      padding: 12px 16px;
      border-radius: 8px;
      backdrop-filter: blur(10px);
    }

    .info-label { font-size: 0.8125rem; opacity: 0.8; margin-bottom: 4px; }
    .info-value { font-size: 1.125rem; font-weight: 600; }

    .section {
      background: var(--surface);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
    }

    .section h2 {
      font-size: 1.375rem;
      margin: 0 0 20px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .staff-table {
      width: 100%;
      border-collapse: collapse;
    }

    .staff-table thead {
      background: var(--gray-50);
    }

    .staff-table th {
      padding: 12px;
      text-align: left;
      font-weight: 600;
      font-size: 0.875rem;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--gray-200);
    }

    .staff-table td {
      padding: 12px;
      border-bottom: 1px solid var(--gray-100);
    }

    .staff-table tbody tr:hover {
      background: var(--gray-50);
    }

    .staff-name { font-weight: 500; }
    .staff-email { color: var(--text-secondary); font-size: 0.9375rem; }

    .action-btn {
      padding: 4px 10px;
      font-size: 0.8125rem;
      border-radius: 4px;
      cursor: pointer;
      border: none;
      transition: all var(--duration) var(--ease);
    }

    .action-btn.delete {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .action-btn.delete:hover {
      background: var(--danger);
      color: white;
    }

    .tier-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8125rem;
      font-weight: 600;
    }

    .tier-free { background: var(--gray-100); color: var(--text-secondary); }
    .tier-pro { background: var(--primary-bg); color: var(--primary); }
    .tier-max { background: var(--success-bg); color: var(--success); }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-primary);
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--gray-300);
      border-radius: 6px;
      font-size: 0.9375rem;
      transition: border-color var(--duration) var(--ease);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-bg);
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .empty-state-icon { font-size: 3rem; margin-bottom: 12px; }

    .exit-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      background: var(--gray-200);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: all var(--duration) var(--ease);
    }

    .exit-btn:hover {
      background: var(--gray-300);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="clinic-container">
    <!-- 헤더 -->
    <div class="clinic-header" style="display:flex; justify-content:space-between; align-items:flex-start;">
      <div>
        <h1 id="clinicTitle">병원 관리</h1>
        <p>병원 정보, 직원 관리, 요금제 변경</p>
      </div>
      <button class="btn" onclick="exitClinic()" style="background:rgba(0,0,0,0.2); color:white; border:1px solid rgba(0,0,0,0.4); padding:8px 16px; border-radius:6px; cursor:pointer; font-size:0.875rem; white-space:nowrap; margin-top:4px; font-weight:500; text-shadow: 0 1px 2px rgba(0,0,0,0.2);">← 이전 단계</button>
    </div>
    <div style="margin-top:16px;">
      <div class="clinic-info">
        <div class="info-card">
          <div class="info-label">현재 요금제</div>
          <div class="info-value" id="tierDisplay">-</div>
        </div>
        <div class="info-card">
          <div class="info-label">직원 수</div>
          <div class="info-value" id="staffCountDisplay">-</div>
        </div>
        <div class="info-card">
          <div class="info-label">가입일</div>
          <div class="info-value" id="createdAtDisplay">-</div>
        </div>
      </div>
    </div>
    </div>

    <!-- 병원 정보 -->
    <div class="section">
      <h2 style="display:flex; justify-content:space-between; align-items:center;">
        🏥 병원 정보
        <button class="btn btn-primary btn-sm" onclick="toggleEditClinicForm()">✏️ 수정</button>
      </h2>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">병원명</label>
          <input type="text" class="form-input" id="clinicName" readonly>
        </div>
        <div class="form-group">
          <label class="form-label">대표원장</label>
          <input type="text" class="form-input" id="directorName" readonly>
        </div>
        <div class="form-group">
          <label class="form-label">지역</label>
          <input type="text" class="form-input" id="region" readonly>
        </div>
        <div class="form-group">
          <label class="form-label">가입일</label>
          <input type="text" class="form-input" id="createdAt" readonly>
        </div>
      </div>

      <!-- 병원 정보 수정 폼 -->
      <div id="editClinicFormContainer" style="display:none; background:var(--gray-50); padding:16px; border-radius:8px; margin-top:16px;">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">대표원장</label>
            <input type="text" class="form-input" id="editDirectorName" placeholder="홍길동">
          </div>
          <div class="form-group">
            <label class="form-label">지역</label>
            <input type="text" class="form-input" id="editRegion" placeholder="예: 서울 강남">
          </div>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-primary btn-sm" onclick="updateClinicInfo()">저장</button>
          <button class="btn btn-secondary btn-sm" onclick="toggleEditClinicForm()">취소</button>
        </div>
      </div>
    </div>

    <!-- 직원로그인 비밀번호 변경 -->
    <div class="section">
      <h2>🔐 직원로그인 비밀번호</h2>
      <p style="color:var(--text-secondary); font-size:0.875rem; margin-bottom:16px;">
        직원들이 로그인할 때 사용하는 6자리 비밀번호를 변경할 수 있습니다.
      </p>
      <div style="background:var(--gray-50); padding:16px; border-radius:8px; margin-bottom:16px;">
        <div style="font-size:0.875rem; color:var(--text-secondary); margin-bottom:12px;">현재 설정</div>
        <div style="display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:12px;">
          <input type="text" readonly class="form-input" id="currentPwd1" value="•" style="text-align:center; font-size:1.5rem; font-weight:700; background:var(--bg-base);">
          <input type="text" readonly class="form-input" id="currentPwd2" value="•" style="text-align:center; font-size:1.5rem; font-weight:700; background:var(--bg-base);">
          <input type="text" readonly class="form-input" id="currentPwd3" value="•" style="text-align:center; font-size:1.5rem; font-weight:700; background:var(--bg-base);">
          <input type="text" readonly class="form-input" id="currentPwd4" value="•" style="text-align:center; font-size:1.5rem; font-weight:700; background:var(--bg-base);">
          <input type="text" readonly class="form-input" id="currentPwd5" value="•" style="text-align:center; font-size:1.5rem; font-weight:700; background:var(--bg-base);">
          <input type="text" readonly class="form-input" id="currentPwd6" value="•" style="text-align:center; font-size:1.5rem; font-weight:700; background:var(--bg-base);">
        </div>
        <div style="display:flex; gap:12px;">
          <button class="btn btn-secondary btn-sm" onclick="togglePasswordDisplay()">숨김</button>
          <span style="font-size:0.875rem; color:var(--text-secondary);">설정됨</span>
        </div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="togglePasswordForm()">비밀번호 변경</button>

      <!-- 비밀번호 변경 폼 -->
      <div id="passwordFormContainer" style="display:none; background:var(--gray-50); padding:16px; border-radius:8px; margin-top:16px;">
        <div class="form-group">
          <label class="form-label">새 비밀번호 (숫자 6자리)</label>
          <div style="display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:16px;">
            <input type="text" class="form-input" id="newPwd1" placeholder="1" maxlength="1" pattern="\\d" inputmode="numeric" style="text-align:center; font-size:1.5rem; font-weight:700;">
            <input type="text" class="form-input" id="newPwd2" placeholder="2" maxlength="1" pattern="\\d" inputmode="numeric" style="text-align:center; font-size:1.5rem; font-weight:700;">
            <input type="text" class="form-input" id="newPwd3" placeholder="3" maxlength="1" pattern="\\d" inputmode="numeric" style="text-align:center; font-size:1.5rem; font-weight:700;">
            <input type="text" class="form-input" id="newPwd4" placeholder="4" maxlength="1" pattern="\\d" inputmode="numeric" style="text-align:center; font-size:1.5rem; font-weight:700;">
            <input type="text" class="form-input" id="newPwd5" placeholder="5" maxlength="1" pattern="\\d" inputmode="numeric" style="text-align:center; font-size:1.5rem; font-weight:700;">
            <input type="text" class="form-input" id="newPwd6" placeholder="6" maxlength="1" pattern="\\d" inputmode="numeric" style="text-align:center; font-size:1.5rem; font-weight:700;">
          </div>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-primary btn-sm" onclick="updatePassword()">저장</button>
          <button class="btn btn-secondary btn-sm" onclick="togglePasswordForm()">취소</button>
        </div>
      </div>
    </div>

    <!-- 직원 관리 -->
    <div class="section">
      <h2>👥 직원 관리</h2>
      <div class="section-toolbar">
        <button class="btn btn-primary btn-sm" onclick="showStaffForm()">➕ 직원 추가</button>
      </div>

      <!-- 직원 추가 폼 -->
      <div id="staffFormContainer" style="display:none; background:var(--gray-50); padding:16px; border-radius:8px; margin-bottom:20px;">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">이름</label>
            <input type="text" class="form-input" id="newStaffName" placeholder="예: 김치과 의사">
          </div>
          <div class="form-group">
            <label class="form-label">이메일</label>
            <input type="email" class="form-input" id="newStaffEmail" placeholder="staff@clinic.com">
          </div>
          <div class="form-group">
            <label class="form-label">휴대폰</label>
            <input type="tel" class="form-input" id="newStaffPhone" placeholder="010-1234-5678">
          </div>
          <div class="form-group">
            <label class="form-label">직급</label>
            <select class="form-input" id="newStaffRole">
              <option value="대표원장">대표원장</option>
              <option value="원장">원장</option>
              <option value="의사">의사</option>
              <option value="상담실장">상담실장</option>
              <option value="간호사">간호사</option>
              <option value="위생사">위생사</option>
            </select>
          </div>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-primary btn-sm" onclick="addStaff()">저장</button>
          <button class="btn btn-secondary btn-sm" onclick="hideStaffForm()">취소</button>
        </div>
      </div>

      <!-- 직원 수정 폼 -->
      <div id="editStaffFormContainer" style="display:none; background:var(--gray-50); padding:16px; border-radius:8px; margin-bottom:20px;">
        <h3 style="margin-top:0; font-size:1rem;">직원 정보 수정</h3>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">휴대폰</label>
            <input type="tel" class="form-input" id="editStaffPhone" placeholder="010-1234-5678">
          </div>
          <div class="form-group">
            <label class="form-label">직급</label>
            <select class="form-input" id="editStaffRole">
              <option value="대표원장">대표원장</option>
              <option value="원장">원장</option>
              <option value="의사">의사</option>
              <option value="상담실장">상담실장</option>
              <option value="간호사">간호사</option>
              <option value="위생사">위생사</option>
            </select>
          </div>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-primary btn-sm" onclick="updateStaff()">저장</button>
          <button class="btn btn-secondary btn-sm" onclick="hideEditStaffForm()">취소</button>
        </div>
      </div>

      <!-- 직원 목록 -->
      <div id="staffTableContainer">
        <table class="staff-table">
          <thead>
            <tr>
              <th>이름</th>
              <th>이메일</th>
              <th>휴대폰</th>
              <th>직급</th>
              <th>가입일</th>
              <th style="width:100px;">작업</th>
            </tr>
          </thead>
          <tbody id="staffTableBody">
          </tbody>
        </table>
      </div>
    </div>

    <!-- 요금제 정보 (읽기 전용) -->
    <div class="section">
      <h2>💳 현재 요금제</h2>
      <div class="info-card" style="background:var(--primary-bg); border:1px solid var(--primary); padding:16px; border-radius:8px; display:inline-block;">
        <div class="info-label" style="color:var(--primary);">요금제</div>
        <div class="info-value" style="color:var(--primary);" id="tierInfo">-</div>
      </div>
      <p style="color:var(--text-secondary); font-size:0.875rem; margin-top:12px;">
        💡 요금제 변경은 시스템 관리자 대시보드에서만 가능합니다.
      </p>
    </div>
  </div>

  <!-- 나가기 버튼 -->
  <button class="exit-btn" onclick="exitClinic()">🚪 나가기</button>

  <!-- 병원 관리자 인증 모달 -->
  <div class="modal-overlay" id="clinicAuthModal">
    <div class="modal" style="max-width:480px;">
      <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--gray-200); padding-bottom:12px;">
        <h3 style="margin:0;">🔐 병원 관리 인증</h3>
        <button class="btn btn-sm btn-secondary" onclick="closeModal('clinicAuthModal')" style="font-size:1rem; padding:4px 10px;">✕</button>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary); font-size:0.875rem; margin-bottom:20px;">
          병원 관리에 접근하기 위해 인증이 필요합니다. 회원가입 시 입력한 정보를 입력해주세요.
        </p>
        <div class="form-group">
          <label class="form-label">병원명 <span style="color:var(--danger);">*</span></label>
          <div style="display:flex; gap:8px;">
            <input type="text" class="form-input" id="authClinicName" placeholder="예: 디지털스마일치과" autocomplete="off" style="flex:1;">
            <button type="button" id="authClinicSearchBtn" class="btn btn-secondary" style="padding:8px 12px; font-size:1.25rem; white-space:nowrap;" title="병원 목록">🔍</button>
          </div>
        </div>
        <!-- 병원 검색 드롭다운 -->
        <div id="authClinicDropdown" style="background:var(--surface); border-top:1px solid var(--gray-200); max-height:250px; overflow-y:auto; display:none; margin-bottom:16px;"></div>
        <div class="form-group">
          <label class="form-label">이메일 <span style="color:var(--danger);">*</span></label>
          <input type="email" class="form-input" id="authClinicEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호 (숫자 6자리) <span style="color:var(--danger);">*</span></label>
          <div style="display:grid; grid-template-columns:repeat(6,1fr); gap:8px;">
            <input type="password" class="form-input" id="authPwd1" placeholder="1" maxlength="1" pattern="\\d" style="text-align:center; font-size:1.5rem; font-weight:700;">
            <input type="password" class="form-input" id="authPwd2" placeholder="2" maxlength="1" pattern="\\d" style="text-align:center; font-size:1.5rem; font-weight:700;">
            <input type="password" class="form-input" id="authPwd3" placeholder="3" maxlength="1" pattern="\\d" style="text-align:center; font-size:1.5rem; font-weight:700;">
            <input type="password" class="form-input" id="authPwd4" placeholder="4" maxlength="1" pattern="\\d" style="text-align:center; font-size:1.5rem; font-weight:700;">
            <input type="password" class="form-input" id="authPwd5" placeholder="5" maxlength="1" pattern="\\d" style="text-align:center; font-size:1.5rem; font-weight:700;">
            <input type="password" class="form-input" id="authPwd6" placeholder="6" maxlength="1" pattern="\\d" style="text-align:center; font-size:1.5rem; font-weight:700;">
          </div>
        </div>
        <div id="authError" style="margin-top:12px; padding:10px 12px; background:var(--danger-bg); color:var(--danger); border-radius:6px; display:none; font-size:0.875rem;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('clinicAuthModal')">취소</button>
        <button class="btn btn-primary" id="authVerifyBtn">✓ 인증</button>
      </div>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/common.js"></script>
  <script>
    let clinicId = null;
    let clinicData = null;
    let isClinicAuthVerified = false;
    let authClinics = [];

    // 병원 목록 로드 (자동완성용)
    async function loadAllClinics() {
      try {
        console.log('[loadAllClinics] 병원 목록 로드 중...');
        const res = await fetch('/api/clinics');
        if (!res.ok) {
          console.warn('[loadAllClinics] API 호출 실패');
          return;
        }
        const data = await res.json();
        allClinics = data.clinics || [];
        console.log('[loadAllClinics] ✅ 완료:', allClinics.length, '개 병원');
      } catch (e) {
        console.error('[loadAllClinics]', e);
      }
    }

    // 병원명 필터링
    function filterAuthClinics(searchTerm) {
      if (!searchTerm) return allClinics.slice(0, 10);
      const term = searchTerm.toLowerCase();
      return allClinics.filter(c => c.name.toLowerCase().includes(term)).slice(0, 10);
    }

    // 인증 모달용 드롭다운 표시
    function showAuthClinicDropdown(clinics) {
      const dropdown = document.getElementById('authClinicDropdown');
      if (!clinics.length) {
        dropdown.style.display = 'none';
        return;
      }
      dropdown.innerHTML = clinics.map(c => `
        <div style="padding:12px 16px; border-bottom:1px solid var(--gray-100); cursor:pointer; transition:background 0.2s;"
             onmouseover="this.style.background='var(--gray-50)'"
             onmouseout="this.style.background='transparent'"
             onclick="setAuthClinicName('${c.name.replace(/'/g, "\\'")}')">
          <div style="font-weight:500; color:var(--text-primary); margin-bottom:4px;">${c.name}</div>
          <div style="font-size:0.75rem; color:var(--text-tertiary);">${c.director_name || ''} ${c.director_name && c.region ? '·' : ''} ${c.region || ''}</div>
        </div>
      `).join('');
      dropdown.style.display = 'block';
    }

    // 인증 모달에서 병원명 선택
    function setAuthClinicName(name) {
      document.getElementById('authClinicName').value = name;
      document.getElementById('authClinicDropdown').style.display = 'none';
      console.log('[setAuthClinicName] 선택됨:', name);
    }

    // 인증 모달의 병원명 입력 이벤트 리스너 등록
    function registerAuthClinicInputListeners() {
      const authClinicInput = document.getElementById('authClinicName');
      const authSearchBtn = document.getElementById('authClinicSearchBtn');
      const authVerifyBtn = document.getElementById('authVerifyBtn');

      console.log('[registerAuthClinicInputListeners] 병원명 입력 이벤트 등록');

      if (authClinicInput) {
        authClinicInput.addEventListener('input', (e) => {
          console.log('[authClinicName] input:', e.target.value);
          const clinics = filterAuthClinics(e.target.value);
          showAuthClinicDropdown(clinics);
        });

        authClinicInput.addEventListener('focus', (e) => {
          if (e.target.value) {
            const clinics = filterAuthClinics(e.target.value);
            showAuthClinicDropdown(clinics);
          }
        });
      }

      if (authSearchBtn) {
        authSearchBtn.addEventListener('click', (e) => {
          e.preventDefault();
          const clinics = filterAuthClinics(authClinicInput.value || '');
          showAuthClinicDropdown(clinics);
        });
      }

      // 인증 버튼 이벤트 리스너
      if (authVerifyBtn) {
        authVerifyBtn.addEventListener('click', (e) => {
          e.preventDefault();
          console.log('[authVerifyBtn] 클릭됨 → verifyClinicAdmin() 호출');
          verifyClinicAdmin();
        });
        console.log('[registerAuthClinicInputListeners] ✅ 인증 버튼 리스너 등록');
      }
    }

    function checkAuth() {
      console.log('[checkAuth] ▶️ 시작 (인증 모달 없음 - 콘텐츠 바로 표시)');

      // 대시보드 콘텐츠 표시
      const container = document.querySelector('.clinic-container');
      if (container) {
        container.style.display = 'block';
        console.log('[checkAuth] ✅ 콘텐츠 표시 완료');
      }

      // 인증 모달 숨김
      const modal = document.getElementById('clinicAuthModal');
      if (modal) {
        modal.style.display = 'none';
        modal.style.opacity = '0';
        modal.style.pointerEvents = 'none';
      }

      console.log('[checkAuth] ✅ 완료');
    }

    async function verifyClinicAdmin() {
      console.log('[verifyClinicAdmin] ▶️ 시작');

      const clinicNameEl = document.getElementById('authClinicName');
      const emailEl = document.getElementById('authClinicEmail');
      const errorEl = document.getElementById('authError');

      const clinicName = clinicNameEl?.value?.trim() || '';
      const email = emailEl?.value?.trim() || '';
      const pwd = [1,2,3,4,5,6].map(i => document.getElementById(`authPwd${i}`)?.value || '').join('');

      console.log('[verifyClinicAdmin] 입력값:', {
        clinicName: clinicName || '(비어있음)',
        email: email || '(비어있음)',
        pwdLength: pwd.length,
        pwd: pwd || '(비어있음)'
      });

      // 유효성 검사
      if (!clinicName) {
        console.warn('[verifyClinicAdmin] ❌ 병원명이 입력되지 않음');
        errorEl.style.display = 'block';
        errorEl.textContent = '병원명을 입력하세요';
        return;
      }

      if (!email) {
        console.warn('[verifyClinicAdmin] ❌ 이메일이 입력되지 않음');
        errorEl.style.display = 'block';
        errorEl.textContent = '이메일을 입력하세요';
        return;
      }

      if (pwd.length !== 6) {
        console.warn('[verifyClinicAdmin] ❌ 비밀번호 길이 오류:', pwd.length);
        errorEl.style.display = 'block';
        errorEl.textContent = '비밀번호는 숫자 6자리를 모두 입력하세요';
        return;
      }

      if (!/^\d{6}$/.test(pwd)) {
        console.warn('[verifyClinicAdmin] ❌ 비밀번호 형식 오류');
        errorEl.style.display = 'block';
        errorEl.textContent = '비밀번호는 숫자만 입력하세요';
        return;
      }

      console.log('[verifyClinicAdmin] ✅ 입력값 검증 성공');

      try {
        errorEl.style.display = 'none';

        console.log('[verifyClinicAdmin] 🔄 /api/login 호출 중...', { clinicName, email, pwdLength: pwd.length });

        const body = JSON.stringify({ clinicName, email, password: pwd });
        console.log('[verifyClinicAdmin] 요청 본문:', body);

        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: body
        });

        console.log('[verifyClinicAdmin] API 응답 상태:', res.status, res.statusText);

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          const errMsg = err.error || '인증 실패. 정보를 다시 확인해주세요.';
          errorEl.style.display = 'block';
          errorEl.textContent = '❌ ' + errMsg;
          console.error('[verifyClinicAdmin] ❌ 인증 실패:', { status: res.status, error: errMsg });
          return;
        }

        const user = await res.json();
        isClinicAuthVerified = true;

        console.log('[verifyClinicAdmin] ✅ 인증 성공:', user);

        // 응답에서 clinic_id 추출
        if (user.clinic_id && !clinicId) {
          clinicId = user.clinic_id;
          console.log('[verifyClinicAdmin] ✅ clinic_id 설정:', clinicId);
        }

        // 인증 성공 → 콘텐츠 표시
        console.log('[verifyClinicAdmin] UI 업데이트 중...');

        const modal = document.getElementById('clinicAuthModal');
        if (modal) {
          modal.classList.remove('active');
          modal.style.opacity = '0';
          modal.style.pointerEvents = 'none';
          console.log('[verifyClinicAdmin] ✅ 모달 닫음');
        }

        const container = document.querySelector('.clinic-container');
        if (container) {
          container.style.display = 'block';
          console.log('[verifyClinicAdmin] ✅ 대시보드 표시');
        }

        console.log('[verifyClinicAdmin] showToast() 호출...');
        showToast('병원 관리자 인증 성공', 'success');
        console.log('[verifyClinicAdmin] ✅ showToast() 완료');

        // 인증 후 병원 정보 로드
        console.log('[verifyClinicAdmin] 병원 정보 로드 중... (clinicId:', clinicId, ')');
        await loadClinicInfo();
        console.log('[verifyClinicAdmin] ✅✅✅ 모든 작업 완료');

      } catch (e) {
        console.error('[verifyClinicAdmin] ❌ 예외 발생:', e.message, e.stack);
        errorEl.style.display = 'block';
        errorEl.textContent = '❌ 오류: ' + e.message;
      }
    }

    async function loadClinicInfo() {
      try {
        console.log('[loadClinicInfo] 시작. clinicId:', clinicId);

        if (!clinicId) {
          console.error('[loadClinicInfo] clinicId 없음');
          showToast('병원 ID가 없습니다', 'error');
          return;
        }

        const res = await fetch(`/api/clinic-info?id=${clinicId}`);
        console.log('[loadClinicInfo] API 응답 상태:', res.status);

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          const errMsg = errData.error || `API 오류 (${res.status})`;
          console.error('[loadClinicInfo] 병원 정보 로드 실패:', errMsg);
          showToast('병원 정보 로드 실패: ' + errMsg, 'error');
          return;
        }

        clinicData = await res.json();
        console.log('[loadClinicInfo] 병원 데이터 로드 완료:', clinicData.name);

        // 대시보드 제목 업데이트
        const titleEl = document.getElementById('clinicTitle');
        if (titleEl) titleEl.textContent = `${clinicData.name} 관리 대시보드`;

        // 병원 정보 표시
        const clinicNameEl = document.getElementById('clinicName');
        if (clinicNameEl) clinicNameEl.value = clinicData.name;

        const directorEl = document.getElementById('directorName');
        if (directorEl) directorEl.value = clinicData.director_name || '-';

        const regionEl = document.getElementById('region');
        if (regionEl) regionEl.value = clinicData.region || '-';

        const createdEl = document.getElementById('createdAt');
        if (createdEl) createdEl.value = new Date(clinicData.created_at).toLocaleDateString('ko-KR');

        const tierDisplayEl = document.getElementById('tierDisplay');
        if (tierDisplayEl) tierDisplayEl.textContent = clinicData.tier.toUpperCase();

        const tierInfoEl = document.getElementById('tierInfo');
        if (tierInfoEl) tierInfoEl.textContent = clinicData.tier.toUpperCase();

        const createdDisplayEl = document.getElementById('createdAtDisplay');
        if (createdDisplayEl) createdDisplayEl.textContent = new Date(clinicData.created_at).toLocaleDateString('ko-KR');

        // 현재 비밀번호 표시
        if (clinicData.password) {
          const pwdChars = clinicData.password.split('');
          for (let i = 1; i <= 6; i++) {
            const elem = document.getElementById(`currentPwd${i}`);
            if (elem) elem.value = pwdChars[i - 1] || '';
          }
        }

        loadStaffList();
        console.log('[loadClinicInfo] ✅ 완료');
      } catch (e) {
        console.error('[loadClinicInfo]', e);
        showToast('오류: ' + e.message, 'error');
      }
    }

    async function loadStaffList() {
      try {
        const res = await fetch(`/api/clinic-staff?id=${clinicId}`);
        if (!res.ok) throw new Error('직원 목록 로드 실패');

        const staff = await res.json();
        document.getElementById('staffCountDisplay').textContent = staff.length;
        renderStaffTable(staff);
      } catch (e) {
        console.error('[loadStaffList]', e);
        showToast('직원 목록 로드 실패: ' + e.message, 'error');
      }
    }

    function renderStaffTable(staff) {
      const tbody = document.getElementById('staffTableBody');

      if (!staff.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" style="text-align:center; padding:40px; color:var(--text-secondary);">
              직원이 없습니다. 추가해주세요.
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = staff.map(s => `
        <tr>
          <td><span class="staff-name">${escapeHTML(s.name)}</span></td>
          <td><span class="staff-email">${escapeHTML(s.email)}</span></td>
          <td>${escapeHTML(s.phone || '-')}</td>
          <td>${escapeHTML(s.role || '직원')}</td>
          <td>${new Date(s.created_at).toLocaleDateString('ko-KR')}</td>
          <td style="display:flex; gap:4px;">
            <button class="action-btn edit-staff-btn" style="background:var(--primary-bg); color:var(--primary);" data-staff-id="${s.id}" data-staff-phone="${s.phone || ''}" data-staff-role="${s.role || '직원'}">수정</button>
            <button class="action-btn delete delete-staff-btn" data-staff-id="${s.id}">삭제</button>
          </td>
        </tr>
      `).join('');

      // 수정 버튼 이벤트 리스너
      document.querySelectorAll('.edit-staff-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const staffId = this.dataset.staffId;
          const phone = this.dataset.staffPhone;
          const role = this.dataset.staffRole;
          showEditStaffForm(staffId, '', phone, role);
        });
      });

      // 삭제 버튼 이벤트 리스너
      document.querySelectorAll('.delete-staff-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const staffId = this.dataset.staffId;
          deleteStaff(staffId);
        });
      });
    }

    function showStaffForm() {
      document.getElementById('staffFormContainer').style.display = 'block';
    }

    function hideStaffForm() {
      document.getElementById('staffFormContainer').style.display = 'none';
      document.getElementById('newStaffName').value = '';
      document.getElementById('newStaffEmail').value = '';
      document.getElementById('newStaffPhone').value = '';
    }

    async function addStaff() {
      const name = document.getElementById('newStaffName').value.trim();
      const email = document.getElementById('newStaffEmail').value.trim();
      const phone = document.getElementById('newStaffPhone').value.trim();
      const role = document.getElementById('newStaffRole').value;

      if (!name || !email) {
        showToast('이름과 이메일은 필수입니다', 'warning');
        return;
      }

      try {
        const res = await fetch('/api/add-staff', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ clinicId, name, email, phone, role })
        });

        if (!res.ok) {
          const err = await res.json();
          showToast(err.error || '직원 추가 실패', 'error');
          return;
        }

        showToast('직원이 추가되었습니다', 'success');
        hideStaffForm();
        loadStaffList();
      } catch (e) {
        console.error('[addStaff]', e);
        showToast('오류: ' + e.message, 'error');
      }
    }

    async function deleteStaff(staffId) {
      if (!confirm('이 직원을 삭제하시겠습니까?')) return;

      try {
        const res = await fetch('/api/delete-staff', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ staffId })
        });

        if (!res.ok) {
          const err = await res.json();
          showToast(err.error || '삭제 실패', 'error');
          return;
        }

        showToast('직원이 삭제되었습니다', 'success');
        loadStaffList();
      } catch (e) {
        console.error('[deleteStaff]', e);
        showToast('오류: ' + e.message, 'error');
      }
    }

    // 직원 수정
    let editingStaffId = null;
    function showEditStaffForm(staffId, name, phone, role) {
      editingStaffId = staffId;
      document.getElementById('editStaffFormContainer').style.display = 'block';
      document.getElementById('editStaffPhone').value = phone;
      document.getElementById('editStaffRole').value = role;
      document.getElementById('editStaffFormContainer').scrollIntoView({ behavior: 'smooth' });
    }

    function hideEditStaffForm() {
      document.getElementById('editStaffFormContainer').style.display = 'none';
      document.getElementById('editStaffPhone').value = '';
      editingStaffId = null;
    }

    async function updateStaff() {
      const phone = document.getElementById('editStaffPhone').value.trim();
      const role = document.getElementById('editStaffRole').value;

      try {
        const res = await fetch('/api/update-staff', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ staffId: editingStaffId, phone, role })
        });

        if (!res.ok) {
          const err = await res.json();
          showToast(err.error || '업데이트 실패', 'error');
          return;
        }

        showToast('직원 정보가 업데이트되었습니다', 'success');
        hideEditStaffForm();
        loadStaffList();
      } catch (e) {
        console.error('[updateStaff]', e);
        showToast('오류: ' + e.message, 'error');
      }
    }

    // 병원 정보 수정
    function toggleEditClinicForm() {
      const form = document.getElementById('editClinicFormContainer');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
      if (form.style.display === 'block') {
        document.getElementById('editDirectorName').value = clinicData.director_name || '';
        document.getElementById('editRegion').value = clinicData.region || '';
      }
    }

    async function updateClinicInfo() {
      const directorName = document.getElementById('editDirectorName').value.trim();
      const region = document.getElementById('editRegion').value.trim();

      if (!directorName || !region) {
        showToast('모든 필드를 입력하세요', 'warning');
        return;
      }

      try {
        const res = await fetch('/api/update-clinic', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ clinicId, directorName, region })
        });

        if (!res.ok) {
          const err = await res.json();
          showToast(err.error || '업데이트 실패', 'error');
          return;
        }

        showToast('병원 정보가 업데이트되었습니다', 'success');
        clinicData.director_name = directorName;
        clinicData.region = region;
        document.getElementById('directorName').value = directorName;
        document.getElementById('region').value = region;
        toggleEditClinicForm();
      } catch (e) {
        console.error('[updateClinicInfo]', e);
        showToast('오류: ' + e.message, 'error');
      }
    }

    // 비밀번호 표시 토글
    let isPasswordDisplaying = false;
    function togglePasswordDisplay() {
      isPasswordDisplaying = !isPasswordDisplaying;
      const btn = event.target;

      if (isPasswordDisplaying) {
        // 숫자 표시
        if (clinicData?.password) {
          const pwdChars = clinicData.password.split('');
          for (let i = 1; i <= 6; i++) {
            document.getElementById(`currentPwd${i}`).value = pwdChars[i - 1] || '';
          }
        }
        btn.textContent = '숨김';
      } else {
        // 마스킹 표시
        for (let i = 1; i <= 6; i++) {
          document.getElementById(`currentPwd${i}`).value = '•';
        }
        btn.textContent = '보임';
      }
    }

    // 비밀번호 변경
    function togglePasswordForm() {
      const form = document.getElementById('passwordFormContainer');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
      if (form.style.display === 'block') {
        document.getElementById('newPwd1').focus();
      }
    }

    async function updatePassword() {
      const pwd = [1,2,3,4,5,6].map(i => document.getElementById(`newPwd${i}`)?.value || '').join('');

      if (pwd.length !== 6 || !/^\d{6}$/.test(pwd)) {
        showToast('비밀번호는 숫자 6자리여야 합니다', 'warning');
        return;
      }

      if (!confirm('비밀번호를 변경하시겠습니까? 직원들에게 새 비밀번호를 알려야 합니다.')) {
        return;
      }

      try {
        const res = await fetch('/api/update-clinic-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ clinicId, password: pwd })
        });

        if (!res.ok) {
          const err = await res.json();
          showToast(err.error || '변경 실패', 'error');
          return;
        }

        showToast('비밀번호가 변경되었습니다', 'success');

        // 현재 비밀번호 업데이트
        clinicData.password = pwd;
        const pwdChars = pwd.split('');
        for (let i = 1; i <= 6; i++) {
          document.getElementById(`currentPwd${i}`).value = pwdChars[i - 1] || '';
        }

        document.getElementById('newPwd1').value = '';
        document.getElementById('newPwd2').value = '';
        document.getElementById('newPwd3').value = '';
        document.getElementById('newPwd4').value = '';
        document.getElementById('newPwd5').value = '';
        document.getElementById('newPwd6').value = '';
        isPasswordDisplaying = false;
        togglePasswordForm();
      } catch (e) {
        console.error('[updatePassword]', e);
        showToast('오류: ' + e.message, 'error');
      }
    }

    function exitClinic() {
      if (confirm('병원 관리를 종료하시겠습니까?')) {
        // redirect 파라미터에 있는 페이지로 돌아가기
        const params = new URLSearchParams(window.location.search);
        const redirectPage = params.get('redirect') || 'dashboard.html';
        window.location.href = redirectPage;
      }
    }

    // DOMContentLoaded 또는 즉시 실행
    function initClinicDashboard() {
      console.log('[initClinicDashboard] ▶️ 실행 시작');
      console.log('[initClinicDashboard] document.readyState:', document.readyState);

      try {
        checkAuth();
        console.log('[initClinicDashboard] ✅ checkAuth() 완료');
      } catch (e) {
        console.error('[initClinicDashboard] ❌ checkAuth() 에러:', e);
      }

      try {
        loadAllClinics();
        console.log('[initClinicDashboard] ✅ loadAllClinics() 완료');
      } catch (e) {
        console.error('[initClinicDashboard] ⚠️ loadAllClinics() 에러:', e);
      }

      try {
        registerAuthClinicInputListeners();
        console.log('[initClinicDashboard] ✅ registerAuthClinicInputListeners() 완료');
      } catch (e) {
        console.error('[initClinicDashboard] ⚠️ registerAuthClinicInputListeners() 에러:', e);
      }

      console.log('[initClinicDashboard] ✅✅✅ 초기화 완료');
    }

    // 즉시 실행 + DOMContentLoaded 대기 (중복 방지)
    console.log('[clinic-dashboard] ▶️ 초기화 시작');
    console.log('[clinic-dashboard] document.readyState:', document.readyState);

    function initAndRegister() {
      console.log('[clinic-dashboard] initAndRegister() 호출됨');
      initClinicDashboard();
    }

    if (document.readyState === 'loading') {
      console.log('[clinic-dashboard] DOMContentLoaded 대기 중...');
      document.addEventListener('DOMContentLoaded', initAndRegister);
    } else {
      console.log('[clinic-dashboard] DOMContentLoaded 이미 발생 → 즉시 실행');
      initAndRegister();
    }
  </script>
</body>
</html>
