<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KPI 대시보드 — 전환율, 상담 시간, 재방문율, 매출을 실시간 모니터링합니다.">
  <title>KPI 대시보드 | Dental Ops AI</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E🦷%3C/text%3E%3C/svg%3E">
  <meta name="theme-color" content="#0066FF">
  <link rel="stylesheet" href="css/common.css">
  <style>
    .kpi-card-icon {
      width: 44px; height: 44px;
      border-radius: var(--radius-md);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.15rem;
      margin-bottom: 12px;
    }
    .chart-card { min-height: 340px; }
    .chart-container {
      position: relative;
      width: 100%;
      height: 260px;
    }
    .chart-container svg { width: 100%; height: 100%; display: block; }

    .funnel-step { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .funnel-label {
      font-size: 0.8125rem; font-weight: 600; color: var(--text-secondary);
      width: 90px; flex-shrink: 0; text-align: right;
    }
    .funnel-bar {
      height: 34px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center;
      padding: 0 14px;
      font-size: 0.8125rem; font-weight: 700; color: #FFF;
      transition: width 0.8s var(--ease);
      min-width: 60px;
    }
    .funnel-count { font-size: 0.8125rem; color: var(--text-tertiary); width: 70px; flex-shrink: 0; }

    .benchmark-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--gray-100);
    }
    .benchmark-row:last-child { border: none; }
    .bm-label { font-weight: 600; }
    .bm-values { font-size: 0.8125rem; color: var(--text-tertiary); }
    .bm-check {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 0.875rem; font-weight: 700; color: #FFF;
    }

    .treatment-legend {
      display: flex; flex-direction: column; gap: 10px;
      padding: 0 12px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.8125rem;
    }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="layout" id="app">
    <div class="main">
      <header class="header">
        <div class="flex items-center gap-12">
          <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
          <span class="header-title">KPI 대시보드</span>
        </div>
        <div class="header-actions">
          <span id="sessionBadge"></span>
        </div>
      </header>

      <div class="content">
        <!-- KPI Grid -->
        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-card-icon" style="background:var(--primary-bg); color:var(--primary);">&#x1F3AF;</div>
            <div class="kpi-label">상담 전환율</div>
            <div class="kpi-value" id="kpiConv">0%</div>
            <div class="kpi-change up" id="kpiConvDelta">&#8593; 0%</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-card-icon" style="background:#FEF3C7; color:#92400E;">&#x23F1;</div>
            <div class="kpi-label">평균 상담시간</div>
            <div class="kpi-value" id="kpiTime">0분</div>
            <div class="kpi-change up" id="kpiTimeDelta">&#8595; 0분</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-card-icon" style="background:#D1FAE5; color:#065F46;">&#x1F501;</div>
            <div class="kpi-label">재방문율</div>
            <div class="kpi-value" id="kpiRevisit">0%</div>
            <div class="kpi-change up" id="kpiRevisitDelta">&#8593; 0%</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-card-icon" style="background:#EDE9FE; color:#6D28D9;">&#x1F916;</div>
            <div class="kpi-label">AI 활용률</div>
            <div class="kpi-value" id="kpiAI">0%</div>
            <div class="kpi-change up" id="kpiAIDelta">&#8593; 0%</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-card-icon" style="background:#CCFBF1; color:#0F766E;">&#x1F4B0;</div>
            <div class="kpi-label">월 매출</div>
            <div class="kpi-value" id="kpiRevenue" style="font-size:1.5rem;">0원</div>
            <div class="kpi-change up" id="kpiRevenueDelta">&#8593; 0%</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-card-icon" style="background:#FEE2E2; color:#991B1B;">&#x1F4C5;</div>
            <div class="kpi-label">오늘 상담</div>
            <div class="kpi-value" id="kpiToday">0</div>
            <div class="kpi-change up">실시간</div>
          </div>
        </div>

        <!-- Charts Row -->
        <div class="grid-2 mt-24">
          <div class="card chart-card">
            <div class="card-header"><h3>일별 매출 추이 (최근 7일, 만원)</h3></div>
            <div class="card-body">
              <div class="chart-container" id="revenueChartWrap"></div>
            </div>
          </div>

          <div class="card chart-card">
            <div class="card-header"><h3>치료 유형 믹스</h3></div>
            <div class="card-body" style="display:flex; gap:16px; align-items:center;">
              <div class="chart-container" id="mixChartWrap" style="flex:0 0 240px; height:240px;"></div>
              <div class="treatment-legend" id="mixLegend" style="flex:1;"></div>
            </div>
          </div>
        </div>

        <!-- Bottom Row -->
        <div class="grid-2 mt-24">
          <div class="card">
            <div class="card-header"><h3>상담 전환 퍼널</h3></div>
            <div class="card-body">
              <div id="funnel"></div>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><h3>KPI 벤치마크 (목표 대비)</h3></div>
            <div class="card-body" id="benchmark"></div>
          </div>
        </div>

        <div class="card mt-24">
          <div class="card-header"><h3>AI 인사이트</h3></div>
          <div class="card-body">
            <div class="grid-3" id="insights"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/qlrcq-framework.js"></script>
  <script src="js/dental-engines.js"></script>
  <script>
    document.getElementById('app').insertAdjacentHTML('afterbegin', renderSidebar('dashboard'));

    const kpi = SampleData.kpi;
    const patients = SampleData.patients;
    const daily = SampleData.dailyRevenue;
    const mix = SampleData.treatmentMix;

    // ---- KPI ----
    function setDelta(id, delta, isLower = false, suffix = '%') {
      const el = document.getElementById(id);
      if (!el) return;
      const good = isLower ? delta < 0 : delta > 0;
      el.className = 'kpi-change ' + (good ? 'up' : 'down');
      const arrow = delta > 0 ? '&#8593;' : (delta < 0 ? '&#8595;' : '&#8594;');
      el.innerHTML = `${arrow} ${Math.abs(delta)}${suffix} vs 지난주`;
    }

    document.getElementById('kpiConv').textContent = kpi.conversionRate + '%';
    setDelta('kpiConvDelta', kpi.conversionRateDelta, false);
    document.getElementById('kpiTime').textContent = kpi.avgConsultMin + '분';
    setDelta('kpiTimeDelta', kpi.avgConsultMinDelta, true, '분');
    document.getElementById('kpiRevisit').textContent = kpi.revisitRate + '%';
    setDelta('kpiRevisitDelta', kpi.revisitRateDelta, false);
    document.getElementById('kpiAI').textContent = kpi.aiUsageRate + '%';
    setDelta('kpiAIDelta', kpi.aiUsageRateDelta, false);
    document.getElementById('kpiRevenue').textContent = formatCurrency(kpi.monthlyRevenue);
    setDelta('kpiRevenueDelta', kpi.monthlyRevenueDelta, false);
    document.getElementById('kpiToday').textContent =
      patients.filter(p => p.status === '상담대기' || p.status === '상담중').length;

    // ---- Line Chart (Revenue) ----
    function drawLineChart() {
      const wrap = document.getElementById('revenueChartWrap');
      const W = 600, H = 260, pad = 40;
      const innerW = W - pad * 2, innerH = H - pad * 2;
      const maxV = Math.max(...daily.map(d => d.revenue));
      const minV = 0;
      const xStep = innerW / (daily.length - 1);

      const points = daily.map((d, i) => {
        const x = pad + i * xStep;
        const y = pad + innerH - ((d.revenue - minV) / (maxV - minV)) * innerH;
        return { x, y, ...d };
      });

      const path = points.map((p, i) => (i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');
      const area = path + ` L${points[points.length - 1].x},${pad + innerH} L${points[0].x},${pad + innerH} Z`;

      // y-axis ticks (4)
      const yTicks = [];
      for (let i = 0; i <= 4; i++) {
        const val = Math.round(minV + (maxV - minV) * (i / 4));
        const y = pad + innerH - (i / 4) * innerH;
        yTicks.push(`<line x1="${pad}" y1="${y}" x2="${W - pad}" y2="${y}" stroke="#F1F5F9" stroke-width="1"/>
                     <text x="${pad - 8}" y="${y + 4}" text-anchor="end" font-size="10" fill="#94A3B8">${val}</text>`);
      }

      const xLabels = points.map(p => `<text x="${p.x}" y="${H - 12}" text-anchor="middle" font-size="10" fill="#94A3B8">${p.date}</text>`).join('');
      const dots = points.map(p => `
        <circle cx="${p.x}" cy="${p.y}" r="5" fill="#0066FF" stroke="#FFF" stroke-width="2">
          <title>${p.date}: ${p.revenue}만원</title>
        </circle>`).join('');

      wrap.innerHTML = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
        ${yTicks.join('')}
        <path d="${area}" fill="url(#revGrad)" opacity="0.2"/>
        <path d="${path}" fill="none" stroke="#0066FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${dots}
        ${xLabels}
        <defs>
          <linearGradient id="revGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0066FF" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#0066FF" stop-opacity="0"/>
          </linearGradient>
        </defs>
      </svg>`;
    }

    // ---- Pie/Donut Chart (Treatment Mix) ----
    function drawPieChart() {
      const wrap = document.getElementById('mixChartWrap');
      const W = 240, H = 240;
      const cx = W / 2, cy = H / 2, r = 90, ir = 55;
      const total = mix.reduce((s, m) => s + m.value, 0);
      let angle = -Math.PI / 2;

      const segments = mix.map(m => {
        const fraction = m.value / total;
        const a2 = angle + fraction * Math.PI * 2;
        const large = fraction > 0.5 ? 1 : 0;
        const x1 = cx + r * Math.cos(angle);
        const y1 = cy + r * Math.sin(angle);
        const x2 = cx + r * Math.cos(a2);
        const y2 = cy + r * Math.sin(a2);
        const x3 = cx + ir * Math.cos(a2);
        const y3 = cy + ir * Math.sin(a2);
        const x4 = cx + ir * Math.cos(angle);
        const y4 = cy + ir * Math.sin(angle);
        const d = `M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} L${x3},${y3} A${ir},${ir} 0 ${large} 0 ${x4},${y4} Z`;
        angle = a2;
        return `<path d="${d}" fill="${m.color}" stroke="#FFF" stroke-width="2">
          <title>${m.name}: ${m.value}%</title>
        </path>`;
      }).join('');

      wrap.innerHTML = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
        ${segments}
        <text x="${cx}" y="${cy - 4}" text-anchor="middle" font-size="13" fill="#64748B">총합</text>
        <text x="${cx}" y="${cy + 18}" text-anchor="middle" font-size="22" font-weight="800" fill="#0F172A">${total}%</text>
      </svg>`;

      document.getElementById('mixLegend').innerHTML = mix.map(m => `
        <div class="legend-item">
          <span class="legend-dot" style="background:${m.color};"></span>
          <span style="flex:1;">${m.name}</span>
          <strong>${m.value}%</strong>
        </div>
      `).join('');
    }

    // ---- Funnel ----
    const funnelData = [
      { label: '상담대기', count: patients.filter(p => p.status === '상담대기').length, color: '#94A3B8' },
      { label: '상담중',   count: patients.filter(p => p.status === '상담중').length, color: '#0066FF' },
      { label: '계약완료', count: patients.filter(p => p.status === '계약완료').length, color: '#00D4AA' },
      { label: '치료중',   count: patients.filter(p => p.status === '치료중').length, color: '#F59E0B' },
      { label: '치료완료', count: patients.filter(p => p.status === '치료완료').length, color: '#0F766E' },
    ];
    // 최소 1로 보정해서 바가 보이게
    const maxCount = Math.max(...funnelData.map(f => f.count), 1);
    const total = funnelData.reduce((s, f) => s + f.count, 0) || 1;
    document.getElementById('funnel').innerHTML = funnelData.map(f => `
      <div class="funnel-step">
        <div class="funnel-label">${f.label}</div>
        <div class="funnel-bar" style="width:${Math.max((f.count / maxCount) * 100, 10)}%; background:${f.color};">${f.count}명</div>
        <div class="funnel-count">${Math.round((f.count / total) * 100)}%</div>
      </div>
    `).join('');

    // ---- Benchmark ----
    const bm = KPIEngine.benchmark(kpi);
    const bmLabels = {
      conversionRate: '전환율',
      avgConsultMin: '평균 상담시간',
      revisitRate: '재방문율',
      aiUsageRate: 'AI 활용률'
    };
    const bmUnits = { conversionRate: '%', avgConsultMin: '분', revisitRate: '%', aiUsageRate: '%' };
    document.getElementById('benchmark').innerHTML = Object.keys(bm).map(k => {
      const item = bm[k];
      const unit = bmUnits[k];
      const color = item.met ? 'var(--success)' : 'var(--danger)';
      const icon = item.met ? '&#10003;' : '&#10005;';
      return `<div class="benchmark-row">
        <div>
          <div class="bm-label">${bmLabels[k]}</div>
          <div class="bm-values">현재 <strong style="color:${color};">${item.current}${unit}</strong> / 목표 ${item.target}${unit}</div>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
          <span style="font-size:0.8125rem; color:${color}; font-weight:700;">${item.delta > 0 ? '+' : ''}${item.delta}${unit}</span>
          <span class="bm-check" style="background:${color};">${icon}</span>
        </div>
      </div>`;
    }).join('');

    // ---- Insights ----
    const insights = [
      { icon: '&#x1F4C8;', title: '매출 상승 추세', desc: '최근 7일 매출이 평균 대비 24% 상승했습니다. 임플란트 상담 증가가 주 원인입니다.', color: 'var(--success)' },
      { icon: '&#x1F3AF;', title: '전환율 개선 기회', desc: `AI 활용 상담의 계약 성공률이 비활용 대비 ${Math.round(kpi.aiUsageRate / 35)}배 높습니다.`, color: 'var(--primary)' },
      { icon: '&#x26A0;', title: '주의: 고가치료 이탈', desc: '임플란트 상담 중 2회차 미도달 환자 3명. 자동화 리마인더 발송을 추천합니다.', color: 'var(--warning)' },
    ];
    document.getElementById('insights').innerHTML = insights.map(i => `
      <div style="padding:18px; background:var(--gray-50); border-radius:var(--radius-md); border-left:4px solid ${i.color};">
        <div style="font-size:1.4rem; margin-bottom:6px;">${i.icon}</div>
        <h4 style="margin-bottom:6px; color:var(--text-primary);">${i.title}</h4>
        <p style="font-size:0.8125rem;">${i.desc}</p>
      </div>
    `).join('');

    drawLineChart();
    drawPieChart();
    window.addEventListener('resize', () => { drawLineChart(); drawPieChart(); });
  </script>
</body>
</html>
