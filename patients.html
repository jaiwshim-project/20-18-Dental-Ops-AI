<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="환자 관리 — 상담·치료 상태를 통합 관리하고 상담 로그를 추적합니다.">
  <title>환자 관리 | Medvo</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E🦷%3C/text%3E%3C/svg%3E">
  <meta name="theme-color" content="var(--primary)">
  <link rel="stylesheet" href="css/common.css">
  <style>
    .patients-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1.5px solid var(--gray-300);
      border-radius: var(--radius-sm);
      padding: 0 14px;
      flex: 1;
      max-width: 360px;
    }
    .search-box input {
      border: none;
      outline: none;
      padding: 10px 0;
      width: 100%;
      font-size: 0.875rem;
      background: transparent;
    }
    .search-box-icon { color: var(--text-tertiary); font-size: 1rem; }

    .filter-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .chip {
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-size: 0.8125rem;
      font-weight: 600;
      border: 1.5px solid var(--gray-200);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--duration) var(--ease);
    }
    .chip:hover, .chip.active { border-color: var(--primary); background: var(--primary-bg); color: var(--primary); }

    .patient-row { cursor: pointer; }
    .patient-row:hover td { background: var(--primary-bg) !important; }

    .patient-name-cell { display: flex; align-items: center; gap: 12px; }
    .patient-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.875rem; font-weight: 700;
      color: #FFF; flex-shrink: 0;
    }

    .prob-bar {
      width: 80px; height: 6px;
      background: var(--gray-200);
      border-radius: 3px;
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }
    .prob-bar-fill { height: 100%; border-radius: 3px; }

    .status-badge {
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      font-weight: 700;
    }

    .detail-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 560px;
      background: var(--surface);
      box-shadow: var(--shadow-xl);
      z-index: 200;
      transform: translateX(100%);
      transition: transform 0.3s var(--ease);
      overflow-y: auto;
    }
    .detail-panel.open { transform: translateX(0); }
    .detail-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 199;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .detail-overlay.open { opacity: 1; pointer-events: all; }
    .detail-header {
      padding: 24px; border-bottom: 1px solid var(--gray-200);
      display: flex; justify-content: space-between; align-items: center;
    }
    .detail-body { padding: 24px; }
    .detail-section { margin-bottom: 28px; }
    .detail-section h4 { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--gray-100); }
    .detail-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .detail-info-item label {
      font-size: 0.75rem; font-weight: 600; color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .detail-info-item div { font-size: 0.9375rem; font-weight: 600; margin-top: 4px; }

    .log-item {
      padding: 12px 14px;
      background: var(--gray-50);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      font-size: 0.8125rem;
    }
    .log-meta { font-size: 0.6875rem; color: var(--text-tertiary); margin-bottom: 4px; }

    /* ===== 환자 종합 분석 리포트 ===== */
    .kv-mini {
      background: var(--surface);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      text-align: center;
    }
    .kv-mini-label { font-size: 0.68rem; color: var(--text-tertiary); font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .kv-mini-val { font-size: 1.15rem; font-weight: 800; color: var(--text-primary); margin-top: 3px; }

    .timeline {
      position: relative;
      padding-left: 20px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 6px; top: 8px; bottom: 8px;
      width: 2px;
      background: linear-gradient(180deg, var(--primary), var(--gray-200));
    }
    .timeline-item {
      position: relative;
      padding: 10px 12px 10px 0;
      margin-bottom: 10px;
    }
    .timeline-dot {
      position: absolute;
      left: -20px; top: 14px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--primary);
      border: 2.5px solid #FFF;
      box-shadow: 0 0 0 2px var(--primary);
    }
    .timeline-content {
      background: var(--gray-50);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      border-left: 3px solid var(--primary);
    }
    .score-chip {
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-size: 0.72rem;
      font-weight: 800;
    }
    .score-chip.high { background: var(--success-bg); color: var(--success-text); }
    .score-chip.mid  { background: var(--warning-bg); color: var(--warning-text); }
    .score-chip.low  { background: var(--danger-bg); color: var(--danger-text); }

    .intent-chip {
      padding: 5px 12px;
      border-radius: var(--radius-full);
      background: var(--primary-bg);
      color: var(--primary);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .mini-chart {
      padding: 10px 0 6px;
    }

    .utterance-list {
      max-height: 360px;
      overflow-y: auto;
      padding: 8px 4px 0;
    }
    .utterance-item {
      padding: 8px 12px;
      background: var(--gray-50);
      border-left: 3px solid var(--info-light-bg);
      border-radius: 0 6px 6px 0;
      margin-bottom: 6px;
    }
    .utterance-meta { font-size: 0.68rem; color: var(--text-tertiary); margin-bottom: 3px; }
    .utterance-text { font-size: 0.82rem; color: var(--text-primary); line-height: 1.55; }

    @media (max-width: 768px) {
      .patients-toolbar { flex-direction: column; align-items: stretch; }
      .search-box { max-width: none; }
      .detail-panel { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="layout" id="app">
    <div class="main">
      <header class="header">
        <div class="flex items-center gap-12">
          <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
          <span class="header-title">환자 관리</span>
        </div>
        <div class="header-actions">
          <span id="sessionBadge"></span>
        </div>
      </header>

      <div class="content">
        <div class="patients-toolbar">
          <div class="search-box">
            <span class="search-box-icon">&#x1F50D;</span>
            <input type="text" id="searchInput" placeholder="이름, 전화번호 검색..." oninput="applyFilters()">
          </div>
          <div class="flex gap-8">
            <button class="btn btn-sm btn-secondary" onclick="reload()">&#x1F504; 새로고침</button>
            <button class="btn btn-primary btn-sm" onclick="openModal('addPatientModal')">+ 신규 환자 등록</button>
          </div>
        </div>

        <div class="filter-chips">
          <button class="chip active" onclick="filterByStatus(this, 'all')">전체</button>
          <button class="chip" onclick="filterByStatus(this, '상담대기')">상담대기</button>
          <button class="chip" onclick="filterByStatus(this, '상담중')">상담중</button>
          <button class="chip" onclick="filterByStatus(this, '계약완료')">계약완료</button>
          <button class="chip" onclick="filterByStatus(this, '치료중')">치료중</button>
          <button class="chip" onclick="filterByStatus(this, '치료완료')">치료완료</button>
          <button class="chip" onclick="filterByStatus(this, '이탈')">이탈</button>
        </div>

        <div class="kpi-grid mt-24">
          <div class="kpi-card">
            <div class="kpi-label">전체 환자</div>
            <div class="kpi-value" id="kpiTotal">0</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">상담대기</div>
            <div class="kpi-value" id="kpiWaiting" style="color:var(--warning);">0</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">계약완료</div>
            <div class="kpi-value" id="kpiContract" style="color:var(--success);">0</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">평균 견적</div>
            <div class="kpi-value" id="kpiEstimate" style="font-size:1.5rem;">0원</div>
          </div>
        </div>

        <div class="card mt-24">
          <div class="card-header flex items-center justify-between">
            <h3>환자 리스트</h3>
            <span id="dataSourceBadge" style="font-size:0.75rem; color:var(--text-tertiary);"></span>
          </div>
          <div class="card-body" style="padding:0;">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>환자</th>
                    <th>나이/성별</th>
                    <th>전화</th>
                    <th>관심 치료</th>
                    <th>상태</th>
                    <th>견적</th>
                    <th>전환확률</th>
                    <th>최근방문</th>
                    <th>액션</th>
                  </tr>
                </thead>
                <tbody id="patientTable"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <h3 id="detailName">환자명</h3>
      <button class="btn btn-sm btn-secondary" onclick="closeDetail()">&#x2715;</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>

  <div class="modal-overlay" id="addPatientModal">
    <div class="modal">
      <div class="modal-header"><h3>신규 환자 등록</h3></div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">이름 *</label>
          <input type="text" class="form-input" id="newName" placeholder="홍길동">
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">나이</label>
            <input type="number" class="form-input" id="newAge" placeholder="30">
          </div>
          <div class="form-group">
            <label class="form-label">성별</label>
            <select class="form-input" id="newGender">
              <option value="남">남</option>
              <option value="여">여</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">전화 *</label>
          <input type="tel" class="form-input" id="newPhone" placeholder="010-0000-0000">
        </div>
        <div class="form-group">
          <label class="form-label">관심 치료</label>
          <select class="form-input" id="newTreatment">
            <option>임플란트</option>
            <option>라미네이트</option>
            <option>교정</option>
            <option>보철</option>
            <option>치아미백</option>
            <option>기타</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">메모</label>
          <textarea class="form-input" id="newMemo" rows="3" placeholder="초진 경위, 특이사항 등"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('addPatientModal')">취소</button>
        <button class="btn btn-primary" onclick="addPatient()">등록</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/qlrcq-framework.js"></script>
  <script src="js/dental-engines.js"></script>
  <script src="js/patients-page.js"></script>
</body>
</html>
