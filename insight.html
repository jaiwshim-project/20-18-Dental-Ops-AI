<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="인사이트 리포트 — 하네스 방법론으로 데이터에서 경영 인사이트를 생성합니다.">
  <title>인사이트 리포트 엔진 | Dental Ops AI</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E🦷%3C/text%3E%3C/svg%3E">
  <meta name="theme-color" content="#0066FF">
  <link rel="stylesheet" href="css/common.css">
  <style>
    .topic-bar {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      align-items: flex-end;
    }
    @media (max-width: 900px) {
      .topic-bar { grid-template-columns: 1fr; }
    }

    /* 하네스 6단계 시각화 */
    .harness-summary {
      padding: 28px 32px;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, #0066FF, #0044CC);
      color: #FFF;
      position: relative;
      margin-bottom: 24px;
    }
    .harness-summary::before {
      content: '"';
      position: absolute;
      top: -8px; left: 24px;
      font-size: 6rem;
      font-weight: 800;
      color: rgba(255,255,255,0.15);
      font-family: Georgia, serif;
      line-height: 1;
    }
    .harness-label {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 12px;
      background: rgba(255,255,255,0.2);
      border-radius: var(--radius-full);
      margin-bottom: 12px;
    }
    .harness-summary-text {
      font-size: 1.15rem;
      line-height: 1.75;
      font-weight: 500;
      color: rgba(255,255,255,0.95);
    }

    .findings-grid {
      display: grid;
      gap: 14px;
      margin-bottom: 24px;
    }
    .finding-card {
      background: var(--surface);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      padding: 20px 22px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      position: relative;
      transition: box-shadow var(--duration) var(--ease);
    }
    .finding-card:hover { box-shadow: var(--shadow-md); }
    @media (max-width: 768px) { .finding-card { grid-template-columns: 1fr; } }
    .finding-col { position: relative; }
    .finding-col + .finding-col::before {
      content: '';
      position: absolute;
      left: -10px; top: 0; bottom: 0;
      width: 1px;
      background: var(--gray-200);
    }
    @media (max-width: 768px) { .finding-col + .finding-col::before { display: none; } }
    .finding-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 6px;
    }
    .finding-label.evidence { color: var(--accent-dark); }
    .finding-label.implication { color: var(--warning); }
    .finding-text { font-size: 0.9rem; line-height: 1.6; color: var(--text-primary); }

    .paradox-box {
      padding: 20px 24px;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, #FEF3C7, #FDE68A);
      border: 2px solid #F59E0B;
      margin-bottom: 24px;
      position: relative;
      padding-left: 80px;
    }
    .paradox-box::before {
      content: '🔄';
      position: absolute;
      left: 24px; top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
    }
    .paradox-label {
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #92400E;
      margin-bottom: 6px;
    }
    .paradox-text { font-size: 1.05rem; font-weight: 600; color: #78350F; line-height: 1.65; }

    .strategy-list {
      background: var(--surface);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      padding: 24px 28px;
      margin-bottom: 24px;
    }
    .strategy-item {
      display: flex;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px dashed var(--gray-200);
    }
    .strategy-item:last-child { border-bottom: none; }
    .strategy-num {
      flex-shrink: 0;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--primary);
      color: #FFF;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .strategy-text { font-size: 0.95rem; line-height: 1.65; color: var(--text-primary); padding-top: 4px; }

    .kpi-tags { display: flex; flex-wrap: wrap; gap: 10px; }
    .kpi-tag {
      padding: 8px 16px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, #EBF3FF, #F0F9FF);
      border: 1px solid #BFDBFE;
      color: var(--primary);
      font-size: 0.85rem;
      font-weight: 600;
    }
    .kpi-tag::before { content: '📊 '; margin-right: 2px; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 28px 0 14px;
    }
    .section-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--gray-900);
      color: #FFF;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .section-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .report-item {
      padding: 14px 16px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-md);
      margin-bottom: 10px;
      cursor: pointer;
      transition: all var(--duration) var(--ease);
      background: var(--surface);
    }
    .report-item:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
      transform: translateX(2px);
    }
    .report-title { font-size: 0.95rem; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
    .report-meta { font-size: 0.75rem; color: var(--text-tertiary); }

    .empty { text-align: center; padding: 40px 20px; color: var(--text-tertiary); font-size: 0.9rem; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 10px; display: block; opacity: 0.5; }

    /* Harness Stepper */
    .stepper {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    @media (max-width: 900px) { .stepper { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 560px) { .stepper { grid-template-columns: repeat(2, 1fr); } }
    .step {
      padding: 14px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-md);
      background: var(--surface);
      position: relative;
      transition: all var(--duration) var(--ease);
    }
    .step.running {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,102,255,0.15);
    }
    .step.running .step-label { color: var(--primary); }
    .step.done {
      border-color: var(--success);
      background: linear-gradient(180deg, #FFFFFF, #F0FDF4);
    }
    .step.done .step-label::after { content: ' ✓'; color: var(--success); font-weight: 800; }
    .step-label { font-size: 0.78rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 3px; }
    .step-desc { font-size: 0.72rem; color: var(--text-tertiary); }
    .step-status { font-size: 0.68rem; color: var(--text-tertiary); margin-top: 6px; min-height: 1em; }
    .step.running .step-status::after {
      content: '실행 중...';
      color: var(--primary);
      font-weight: 600;
    }
    .step.done .step-status::after {
      content: '완료';
      color: var(--success);
      font-weight: 600;
    }
    .step-dot {
      position: absolute;
      top: 10px; right: 10px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gray-300);
    }
    .step.running .step-dot {
      background: var(--primary);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .step.done .step-dot { background: var(--success); }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

    /* Prose output */
    .prose-box {
      background: var(--surface);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 32px 36px;
      line-height: 1.85;
      font-size: 1rem;
      color: var(--text-primary);
      margin-bottom: 24px;
    }
    .prose-box h1 { font-size: 1.6rem; margin: 0 0 20px; }
    .prose-box h2 { font-size: 1.2rem; margin: 28px 0 12px; color: var(--gray-900); }
    .prose-box h3 { font-size: 1.05rem; margin: 20px 0 8px; }
    .prose-box p { margin: 0 0 14px; color: var(--text-primary); }
    .prose-box blockquote {
      border-left: 3px solid var(--primary);
      padding: 8px 0 8px 18px;
      margin: 16px 0;
      color: var(--text-secondary);
      font-style: italic;
    }
    .prose-box hr { border: 0; border-top: 1px dashed var(--gray-300); margin: 22px 0; }
    .prose-box strong { color: var(--gray-900); }
    .prose-box em { color: var(--primary); font-style: normal; font-weight: 600; }

    .stage-detail {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      margin-bottom: 10px;
      font-size: 0.85rem;
    }
    .stage-detail summary { cursor: pointer; font-weight: 700; color: var(--gray-800); padding: 4px 0; }
    .stage-detail[open] summary { margin-bottom: 10px; }
    .stage-detail pre {
      background: var(--surface);
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      overflow-x: auto;
      font-size: 0.78rem;
      line-height: 1.5;
      color: var(--gray-800);
      border: 1px solid var(--gray-200);
    }

    /* 프린트 */
    @media print {
      .sidebar, .header, .hamburger, .topic-bar, .action-bar, .report-list-card, .premium-footer { display: none !important; }
      .main { margin-left: 0 !important; }
      .content { padding: 0 !important; max-width: none !important; }
      .harness-summary { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <div class="layout" id="app">
    <div class="main">
      <header class="header">
        <div class="flex items-center gap-12">
          <button class="hamburger" onclick="toggleSidebar()">☰</button>
          <span class="header-title">🧠 인사이트 리포트 엔진</span>
        </div>
        <div class="header-actions">
          <span id="sessionBadge"></span>
        </div>
      </header>
      <div class="content">

        <div class="mb-24">
          <h1 style="font-size:1.5rem; margin-bottom:6px;">Harness 6단계 인사이트 리포트</h1>
          <p style="font-size:0.9rem;">Curator → Insight Miner → Architect → Writer → Critic → Editor 6단계로 경영 인사이트를 생성합니다.</p>
        </div>

        <!-- 주제 선택 -->
        <div class="card mb-24">
          <div class="card-body">
            <div class="topic-bar">
              <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">분석 주제 (프리셋)</label>
                <select class="form-input" id="topicSelect">
                  <option value="이번 주 전환율 분석">📈 이번 주 전환율 분석</option>
                  <option value="임플란트 고객 패턴">🦷 임플란트 고객 패턴</option>
                  <option value="상담 시간 최적화">⏱️ 상담 시간 최적화</option>
                  <option value="재방문율 저하 원인">🔄 재방문율 저하 원인</option>
                  <option value="객단가 성장 전략">💰 객단가 성장 전략</option>
                </select>
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">또는 커스텀 주제</label>
                <input type="text" class="form-input" id="customTopic" placeholder="예: 20대 환자 이탈 원인">
              </div>
              <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <button class="btn btn-primary btn-lg" onclick="runReport()" id="runBtn" title="1단계 빠른 요약">
                  🚀 빠른 리포트
                </button>
                <button class="btn btn-accent btn-lg" onclick="runHarness()" id="harnessBtn" title="6단계 하네스 파이프라인">
                  🧠 하네스 6단계
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- 리포트 결과 -->
        <div id="reportArea">
          <div class="card">
            <div class="card-body">
              <div class="empty">
                <span class="empty-icon">🧠</span>
                위에서 주제를 선택하고 <strong>리포트 생성</strong> 버튼을 눌러주세요.
              </div>
            </div>
          </div>
        </div>

        <!-- 액션 바 -->
        <div class="card mt-24 action-bar" id="actionBar" style="display:none;">
          <div class="card-body" style="display:flex; gap:12px; flex-wrap:wrap;">
            <button class="btn btn-accent" onclick="saveReport()">💾 리포트 저장</button>
            <button class="btn btn-secondary" onclick="downloadPDF()">📄 PDF 다운로드</button>
            <button class="btn btn-outline" onclick="runReport()">🔄 재생성</button>
          </div>
        </div>

        <!-- 저장된 리포트 목록 -->
        <div class="card mt-32 report-list-card">
          <div class="card-header">
            <h3>📚 저장된 리포트 (최근 5건)</h3>
          </div>
          <div class="card-body">
            <div id="reportList"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/qlrcq-framework.js"></script>
  <script src="js/dental-engines.js"></script>
  <script src="js/harness-engine.js"></script>
  <script>
    document.getElementById('app').insertAdjacentHTML('afterbegin', renderSidebar('insight'));

    let currentReport = null;

    function getTopic() {
      const custom = document.getElementById('customTopic').value.trim();
      return custom || document.getElementById('topicSelect').value;
    }

    function parseStrategy(strategyText) {
      if (Array.isArray(strategyText)) return strategyText;
      if (!strategyText) return [];
      return strategyText.split('\n')
        .map(s => s.trim())
        .filter(Boolean)
        .map(s => s.replace(/^[0-9]+[)\.)]\s*/, '').replace(/^[-•]\s*/, ''));
    }

    async function runReport() {
      const topic = getTopic();
      if (!topic) { showToast('주제를 선택하거나 입력하세요', 'warning'); return; }

      const btn = document.getElementById('runBtn');
      btn.disabled = true;
      btn.textContent = '⏳ 생성 중...';

      const area = document.getElementById('reportArea');
      area.innerHTML = '<div class="card"><div class="card-body" style="display:flex; flex-direction:column; align-items:center; padding:60px;"><div class="spinner" style="margin-bottom:20px;"></div><p>6단계 하네스 분석 중...</p></div></div>';

      try {
        const res = await InsightEngine.generate({ topic, data: SampleData });
        const data = res.data;
        currentReport = { topic, data, isDemo: res.demo, createdAt: new Date().toISOString() };
        renderReport(topic, data, res.demo);
        document.getElementById('actionBar').style.display = 'block';
        if (res.demo) showToast('데모 응답 생성됨 (API 키 미설정)', 'warning');
        else showToast('인사이트 리포트 생성 완료', 'success');
      } catch (e) {
        area.innerHTML = '<div class="card"><div class="card-body"><p style="color:var(--danger);">오류: ' + e.message + '</p></div></div>';
      } finally {
        btn.disabled = false;
        btn.textContent = '🚀 리포트 생성';
      }
    }

    function renderReport(topic, data, isDemo) {
      const area = document.getElementById('reportArea');
      const findings = data.findings || [];
      const strategy = parseStrategy(data.strategy);
      const kpis = data.kpi_to_track || [];

      area.innerHTML = `
        <div id="reportContent">
          <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:16px;">
            <div>
              <h2 style="font-size:1.5rem; margin-bottom:4px;">${topic}</h2>
              <p style="font-size:0.85rem; color:var(--text-tertiary);">생성일 ${formatDate(new Date())} · Harness 6-Stage ${isDemo ? '· <span style="color:var(--warning);">데모 모드</span>' : ''}</p>
            </div>
            <span class="badge badge-primary">🧠 Insight Report</span>
          </div>

          <div class="section-header">
            <span class="section-num">1</span>
            <span class="section-title">Summary (큐레이터 요약)</span>
          </div>
          <div class="harness-summary">
            <div class="harness-label">Executive Summary</div>
            <div class="harness-summary-text">${data.summary || '요약 없음'}</div>
          </div>

          <div class="section-header">
            <span class="section-num">2</span>
            <span class="section-title">Findings (발견된 패턴 · 근거 · 함의)</span>
          </div>
          <div class="findings-grid">
            ${findings.length ? findings.map((f, i) => `
              <div class="finding-card">
                <div class="finding-col">
                  <div class="finding-label">🔍 Pattern ${i + 1}</div>
                  <div class="finding-text">${f.pattern || '—'}</div>
                </div>
                <div class="finding-col">
                  <div class="finding-label evidence">📊 Evidence</div>
                  <div class="finding-text">${f.evidence || '—'}</div>
                </div>
                <div class="finding-col">
                  <div class="finding-label implication">💡 Implication</div>
                  <div class="finding-text">${f.implication || '—'}</div>
                </div>
              </div>
            `).join('') : '<div class="empty">발견된 패턴 없음</div>'}
          </div>

          ${data.paradox ? `
            <div class="section-header">
              <span class="section-num">3</span>
              <span class="section-title">Paradox (역설)</span>
            </div>
            <div class="paradox-box">
              <div class="paradox-label">역설 · PARADOX</div>
              <div class="paradox-text">${data.paradox}</div>
            </div>
          ` : ''}

          <div class="section-header">
            <span class="section-num">4</span>
            <span class="section-title">Strategy (전략 제안)</span>
          </div>
          <div class="strategy-list">
            ${strategy.length ? strategy.map((s, i) => `
              <div class="strategy-item">
                <div class="strategy-num">${i + 1}</div>
                <div class="strategy-text">${s}</div>
              </div>
            `).join('') : '<p style="color:var(--text-tertiary);">전략 없음</p>'}
          </div>

          <div class="section-header">
            <span class="section-num">5</span>
            <span class="section-title">KPI to Track (추적 지표)</span>
          </div>
          <div class="kpi-tags">
            ${kpis.length ? kpis.map(k => `<span class="kpi-tag">${k}</span>`).join('') : '<span class="kpi-tag">—</span>'}
          </div>
        </div>
      `;
    }

    async function saveReport() {
      if (!currentReport) { showToast('저장할 리포트가 없습니다', 'warning'); return; }
      const { topic, data } = currentReport;
      const session = Session.get();
      const payload = {
        title: topic,
        type: 'harness',
        summary: data.summary || '',
        findings: data.findings || [],
        strategy: data.strategy || '',
        author: session?.name || '익명'
      };

      // Supabase 전용
      if (typeof SupabaseDB === 'undefined' || !SupabaseDB.isReady()) {
        showToast('Supabase 미연결 — 리포트가 저장되지 않습니다', 'error');
        return;
      }
      try {
        await SupabaseDB.saveInsightReport({
          ...payload,
          // findings JSONB에 raw data도 함께 저장 (loadReport용)
          findings: Array.isArray(payload.findings) && payload.findings.length
            ? payload.findings
            : [{ _raw: data }]
        });
        showToast('Supabase에 저장되었습니다', 'success');
        await renderReportList();
      } catch (e) {
        console.warn('Supabase 저장 실패', e);
        showToast('저장 실패: ' + e.message, 'error');
      }
    }

    function downloadPDF() {
      if (!currentReport) { showToast('다운로드할 리포트가 없습니다', 'warning'); return; }
      showToast('인쇄 대화상자에서 PDF로 저장하세요', 'info');
      setTimeout(() => window.print(), 500);
    }

    async function renderReportList() {
      const el = document.getElementById('reportList');
      let list = [];
      if (typeof SupabaseDB === 'undefined' || !SupabaseDB.isReady()) {
        el.innerHTML = '<div class="empty"><span class="empty-icon">🔌</span>Supabase 연결 필요</div>';
        return;
      }
      try {
        list = await SupabaseDB.getInsightReports({ limit: 5 });
      } catch (e) {
        console.warn(e);
        el.innerHTML = '<div class="empty"><span class="empty-icon">⚠️</span>조회 실패</div>';
        return;
      }

      if (!list || !list.length) {
        el.innerHTML = '<div class="empty"><span class="empty-icon">📭</span>저장된 리포트가 없습니다.</div>';
        return;
      }
      el.innerHTML = list.map((r, i) => `
        <div class="report-item" onclick="loadReport(${i})">
          <div class="report-title">${r.title || '(제목 없음)'}</div>
          <div class="report-meta">👤 ${r.author || '-'} · ${formatDate(r.created_at || r.createdAt || new Date())}</div>
          <div style="font-size:0.8rem; color:var(--text-secondary); margin-top:6px; line-height:1.5;">
            ${((r.summary || '') + '').slice(0, 120)}${((r.summary || '') + '').length > 120 ? '...' : ''}
          </div>
        </div>
      `).join('');
      // 리스트 캐시
      window.__reportCache = list;
    }

    function loadReport(i) {
      const list = window.__reportCache || [];
      const r = list[i];
      if (!r) return;
      // Supabase 포맷 또는 로컬 포맷 모두 지원
      const data = r.data || {
        summary: r.summary,
        findings: r.findings || [],
        strategy: r.strategy || '',
        paradox: r.paradox || '',
        kpi_to_track: r.kpi_to_track || []
      };
      currentReport = { topic: r.title, data, isDemo: false, createdAt: r.created_at || r.createdAt };
      renderReport(r.title, data, false);
      document.getElementById('actionBar').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
      showToast('리포트를 불러왔습니다', 'info');
    }

    // ============================================================
    // Harness 6-Stage Pipeline
    // ============================================================

    function stepperHTML() {
      const stages = (window.HarnessEngine && HarnessEngine.STAGES) || [];
      return `
        <div class="card mb-24">
          <div class="card-body">
            <div class="stepper" id="stepper">
              ${stages.map(s => `
                <div class="step" id="step-${s.id}">
                  <div class="step-dot"></div>
                  <div class="step-label">${s.label}</div>
                  <div class="step-desc">${s.desc}</div>
                  <div class="step-status"></div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>`;
    }

    function setStep(id, status) {
      const el = document.getElementById('step-' + id);
      if (!el) return;
      el.classList.remove('running', 'done');
      if (status) el.classList.add(status);
    }

    // 간단한 마크다운 → HTML (XSS 안전: 먼저 escape 후 패턴 복원)
    function renderMarkdown(md) {
      if (!md) return '';
      let h = escapeHTML(md);
      h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
      h = h.replace(/^---$/gm, '<hr>');
      h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      h = h.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, '<em>$1</em>');
      const blocks = h.split(/\n\s*\n/).map(b => {
        const t = b.trim();
        if (!t) return '';
        if (/^<(h[1-3]|blockquote|hr|ul|ol|pre)/.test(t)) return t;
        return '<p>' + t.replace(/\n/g, '<br>') + '</p>';
      });
      return blocks.join('\n');
    }

    async function runHarness() {
      const topic = getTopic();
      if (!topic) { showToast('주제를 선택하거나 입력하세요', 'warning'); return; }

      const hBtn = document.getElementById('harnessBtn');
      const qBtn = document.getElementById('runBtn');
      hBtn.disabled = true; qBtn.disabled = true;
      hBtn.textContent = '⏳ 하네스 가동 중...';

      const area = document.getElementById('reportArea');
      area.innerHTML = stepperHTML() +
        '<div class="card"><div class="card-body"><div class="card-loading"><span class="spinner-sm"></span> 하네스 파이프라인을 시작합니다...</div></div></div>';

      const stageResults = {};
      try {
        const result = await HarnessEngine.run(
          { topic, data: SampleData },
          (stageId, payload, meta) => {
            if (meta.status === 'running') setStep(stageId, 'running');
            else if (meta.status === 'done') {
              setStep(stageId, 'done');
              stageResults[stageId] = payload;
            }
          }
        );

        currentReport = {
          topic,
          data: result.structured,
          harness: result,
          isDemo: result.isDemo,
          createdAt: new Date().toISOString()
        };

        renderHarnessReport(topic, result);
        document.getElementById('actionBar').style.display = 'block';

        if (result.isDemo) showToast('일부 단계가 데모 응답으로 생성됨', 'warning');
        else showToast('하네스 6단계 인사이트 생성 완료', 'success');
      } catch (e) {
        const err = document.createElement('div');
        err.className = 'card';
        const body = document.createElement('div');
        body.className = 'card-body';
        const p = document.createElement('p');
        p.style.color = 'var(--danger)';
        p.textContent = '하네스 실행 오류: ' + e.message;
        body.appendChild(p);
        err.appendChild(body);
        area.appendChild(err);
      } finally {
        hBtn.disabled = false; qBtn.disabled = false;
        hBtn.textContent = '🧠 하네스 6단계';
      }
    }

    function renderHarnessReport(topic, h) {
      const area = document.getElementById('reportArea');
      const s = h.structured || {};
      const findings = s.findings || [];
      const strategy = parseStrategy(s.strategy);
      const kpis = s.kpi_to_track || [];

      // 헤더 + 스테퍼는 유지 (최상단)
      const header = `
        <div id="reportContent">
          <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:16px;">
            <div>
              <h2 style="font-size:1.5rem; margin-bottom:4px;">${escapeHTML(topic)}</h2>
              <p style="font-size:0.85rem; color:var(--text-tertiary);">생성일 ${formatDate(new Date())} · Harness 6-Stage ${h.isDemo ? '· <span style="color:var(--warning);">데모 응답 포함</span>' : ''}</p>
            </div>
            <span class="badge badge-primary">🧠 Harness Report</span>
          </div>
      `;

      // ① 최종 산문 (Writer+Editor 결과)
      const proseSection = `
        <div class="section-header">
          <span class="section-num">★</span>
          <span class="section-title">최종 산문 (Writer → Editor)</span>
        </div>
        <div class="prose-box">${renderMarkdown(h.final || h.draft || '')}</div>
      `;

      // ② 구조화 요약 (기존 포맷 재사용)
      const summarySection = `
        <div class="section-header">
          <span class="section-num">1</span>
          <span class="section-title">Summary</span>
        </div>
        <div class="harness-summary">
          <div class="harness-label">Executive Summary</div>
          <div class="harness-summary-text">${escapeHTML(s.summary || h.blueprint?.thesis || '요약 없음')}</div>
        </div>

        <div class="section-header">
          <span class="section-num">2</span>
          <span class="section-title">Findings</span>
        </div>
        <div class="findings-grid">
          ${findings.length ? findings.map((f, i) => `
            <div class="finding-card">
              <div class="finding-col">
                <div class="finding-label">🔍 Pattern ${i + 1}</div>
                <div class="finding-text">${escapeHTML(f.pattern || '—')}</div>
              </div>
              <div class="finding-col">
                <div class="finding-label evidence">📊 Evidence</div>
                <div class="finding-text">${escapeHTML(f.evidence || '—')}</div>
              </div>
              <div class="finding-col">
                <div class="finding-label implication">💡 Implication</div>
                <div class="finding-text">${escapeHTML(f.implication || '—')}</div>
              </div>
            </div>
          `).join('') : '<div class="empty">발견된 패턴 없음</div>'}
        </div>

        ${s.paradox ? `
          <div class="section-header">
            <span class="section-num">3</span>
            <span class="section-title">Paradox</span>
          </div>
          <div class="paradox-box">
            <div class="paradox-label">역설 · PARADOX</div>
            <div class="paradox-text">${escapeHTML(s.paradox)}</div>
          </div>
        ` : ''}

        <div class="section-header">
          <span class="section-num">4</span>
          <span class="section-title">Strategy</span>
        </div>
        <div class="strategy-list">
          ${strategy.length ? strategy.map((x, i) => `
            <div class="strategy-item">
              <div class="strategy-num">${i + 1}</div>
              <div class="strategy-text">${escapeHTML(x)}</div>
            </div>
          `).join('') : '<p style="color:var(--text-tertiary);">전략 없음</p>'}
        </div>

        <div class="section-header">
          <span class="section-num">5</span>
          <span class="section-title">KPI to Track</span>
        </div>
        <div class="kpi-tags">
          ${kpis.length ? kpis.map(k => `<span class="kpi-tag">${escapeHTML(k)}</span>`).join('') : '<span class="kpi-tag">—</span>'}
        </div>
      `;

      // ③ 단계별 원시 결과 (접힌 상태)
      const detailsSection = `
        <div class="section-header">
          <span class="section-num">⚙</span>
          <span class="section-title">파이프라인 원시 결과 (단계별)</span>
        </div>
        <details class="stage-detail">
          <summary>① Curator — 재료 카드 ${h.cards?.length || 0}개</summary>
          <pre>${escapeHTML(JSON.stringify(h.cards || [], null, 2))}</pre>
        </details>
        <details class="stage-detail">
          <summary>② Miner — 인사이트 ${h.insights?.length || 0}개 + 중심 역설</summary>
          <pre>${escapeHTML(JSON.stringify({ insights: h.insights, paradox: h.paradox }, null, 2))}</pre>
        </details>
        <details class="stage-detail">
          <summary>③ Architect — 도면 (명제 + 메타포 + ${h.blueprint?.sections?.length || 0}섹션)</summary>
          <pre>${escapeHTML(JSON.stringify(h.blueprint || {}, null, 2))}</pre>
        </details>
        <details class="stage-detail">
          <summary>④ Writer — 초안 (수정 전)</summary>
          <div class="prose-box" style="margin-top:10px;">${renderMarkdown(h.draft || '')}</div>
        </details>
        <details class="stage-detail">
          <summary>⑤ Critic — 클리셰 ${h.critique?.cliche_risk || '-'} · 비약 ${h.critique?.logical_gaps?.length || 0}건</summary>
          <pre>${escapeHTML(JSON.stringify(h.critique || {}, null, 2))}</pre>
        </details>
      `;

      area.insertAdjacentHTML(
        'beforeend',
        header + proseSection + summarySection + detailsSection + '</div>'
      );
    }

    // 초기화
    renderReportList();
  </script>
</body>
</html>
