<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="상담 리뷰 — 전체 상담 세션을 필터·정렬해 조회하고, 상세 대화·코칭·평가를 확인합니다.">
  <title>상담 리뷰 | Medvo</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E🦷%3C/text%3E%3C/svg%3E">
  <meta name="theme-color" content="var(--primary)">
  <link rel="stylesheet" href="css/common.css">
  <style>
    .summary-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      padding: 14px 18px;
    }
    .summary-label { font-size: 0.7rem; color: var(--text-tertiary); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }
    .summary-value { font-size: 1.5rem; font-weight: 800; color: var(--text-primary); }
    .summary-sub { font-size: 0.72rem; color: var(--text-tertiary); margin-top: 2px; }

    .filter-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)) auto;
      gap: 10px;
      padding: 14px 16px;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      margin-bottom: 14px;
      align-items: end;
    }
    .filter-bar .form-group { margin-bottom: 0; }
    .filter-bar label { font-size: 0.7rem; font-weight: 700; color: var(--text-tertiary); margin-bottom: 4px; display:block; }

    .review-table {
      width: 100%;
      background: var(--surface);
      border-collapse: collapse;
    }
    .review-table th {
      background: var(--gray-50);
      padding: 10px 12px;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 2px solid var(--gray-200);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .review-table th:hover { background: var(--gray-100); color: var(--primary); }
    .review-table th.sort-asc::after  { content: ' ▲'; color: var(--primary); }
    .review-table th.sort-desc::after { content: ' ▼'; color: var(--primary); }
    .review-table td {
      padding: 12px;
      border-bottom: 1px solid var(--gray-100);
      font-size: 0.88rem;
      color: var(--text-primary);
    }
    .review-table tbody tr { cursor: pointer; transition: background var(--duration) var(--ease); }
    .review-table tbody tr:hover { background: #F0F9FF; }

    .score-pill {
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-size: 0.74rem;
      font-weight: 800;
      display: inline-block;
    }
    .score-pill.high { background: var(--success-bg); color: var(--success-text); }
    .score-pill.mid  { background: var(--warning-bg); color: var(--warning-text); }
    .score-pill.low  { background: var(--danger-bg); color: var(--danger-text); }
    .score-pill.none { background: var(--gray-100); color: var(--text-tertiary); }

    .readiness-delta {
      font-size: 0.78rem;
      color: var(--text-secondary);
    }
    .readiness-delta .up   { color: var(--success); font-weight: 800; }
    .readiness-delta .down { color: var(--danger); font-weight: 800; }

    .staff-chart {
      background: var(--surface);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      margin-bottom: 20px;
    }
    .staff-chart h4 {
      font-size: 0.88rem;
      margin-bottom: 12px;
      color: var(--gray-800);
    }
    .staff-bars { display: flex; flex-direction: column; gap: 8px; }
    .staff-row {
      display: grid;
      grid-template-columns: 120px 1fr 90px 60px;
      gap: 10px;
      align-items: center;
      font-size: 0.82rem;
    }
    .staff-name { font-weight: 700; color: var(--text-primary); }
    .staff-bar-track { background: var(--gray-100); height: 8px; border-radius: 4px; overflow: hidden; }
    .staff-bar-fill  { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 4px; }
    .staff-score { text-align: right; color: var(--text-secondary); font-weight: 700; }
    .staff-count { text-align: right; font-size: 0.72rem; color: var(--text-tertiary); }

    /* Detail 슬라이드 패널 */
    .detail-overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,0.4);
      opacity: 0; pointer-events: none;
      transition: opacity var(--duration) var(--ease);
      z-index: 90;
    }
    .detail-overlay.open { opacity: 1; pointer-events: all; }
    .detail-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 640px; max-width: 100vw;
      background: var(--surface);
      box-shadow: -8px 0 24px rgba(0,0,0,0.12);
      transform: translateX(100%);
      transition: transform var(--duration) var(--ease);
      z-index: 100;
      display: flex;
      flex-direction: column;
    }
    .detail-panel.open { transform: translateX(0); }
    .detail-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--gray-200);
      display: flex; justify-content: space-between; align-items: center;
    }
    .detail-body { padding: 22px 24px; flex: 1; overflow-y: auto; }
    .detail-section { margin-bottom: 24px; }
    .detail-section h4 {
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--gray-800);
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--gray-100);
    }

    .dlog-turns {
      display: flex; flex-direction: column; gap: 6px;
      background: var(--gray-50);
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      max-height: 320px;
      overflow-y: auto;
    }
    .dlog-bubble {
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 0.85rem;
      line-height: 1.5;
      max-width: 85%;
    }
    .dlog-bubble.patient { align-self: flex-start; background: var(--primary-bg); color: #1E3A8A; border-bottom-left-radius: 4px; }
    .dlog-bubble.staff { align-self: flex-end; background: var(--success-light-bg); color: #14532D; border-bottom-right-radius: 4px; }
    .dlog-bubble .meta { font-size: 0.64rem; font-weight: 800; opacity: 0.6; margin-bottom: 2px; text-transform: uppercase; }

    .dlog-coach {
      background: linear-gradient(135deg, var(--primary-bg), #F0FDF4);
      border: 1px solid var(--info-light-bg);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .dlog-coach-head {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .dlog-coach-reply {
      background: var(--surface);
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.82rem;
      line-height: 1.6;
      color: var(--gray-800);
      white-space: pre-wrap;
    }

    .eval-scores {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .eval-score-cell {
      background: var(--gray-50);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      font-size: 0.8rem;
    }
    .eval-score-cell strong { color: var(--primary); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-tertiary);
    }

    @media (max-width: 900px) {
      .detail-panel { width: 100vw; }
      .review-table th:nth-child(n+6),
      .review-table td:nth-child(n+6) { display: none; }
    }
  </style>
</head>
<body>
  <div class="layout" id="app">
    <div class="main">
      <header class="header">
        <div class="flex items-center gap-12">
          <button class="hamburger" onclick="toggleSidebar()">☰</button>
          <span class="header-title">📋 상담 리뷰</span>
        </div>
        <div class="header-actions">
          <span id="sessionBadge"></span>
        </div>
      </header>

      <div class="content">
        <!-- 요약 카드 -->
        <div class="summary-row" id="summaryRow">
          <div class="summary-card"><div class="summary-label">이번 주 세션</div><div class="summary-value" id="sumThisWeek">-</div><div class="summary-sub" id="sumThisWeekSub">-</div></div>
          <div class="summary-card"><div class="summary-label">총 세션</div><div class="summary-value" id="sumTotal">-</div><div class="summary-sub">전체 기간</div></div>
          <div class="summary-card"><div class="summary-label">평균 점수</div><div class="summary-value" id="sumAvgScore">-</div><div class="summary-sub">평가 완료 기준</div></div>
          <div class="summary-card"><div class="summary-label">상담사 수</div><div class="summary-value" id="sumStaff">-</div><div class="summary-sub" id="sumTopStaff">Top: -</div></div>
          <div class="summary-card"><div class="summary-label">평균 듀레이션</div><div class="summary-value" id="sumAvgMin">-</div><div class="summary-sub">분/세션</div></div>
        </div>

        <!-- 상담사별 성과 -->
        <div class="staff-chart" id="staffChartCard">
          <h4>🏆 상담사별 성과</h4>
          <div class="staff-bars" id="staffBars"></div>
        </div>

        <!-- 필터 바 -->
        <div class="filter-bar">
          <div class="form-group">
            <label>기간</label>
            <select class="form-input" id="filterRange" onchange="applyFilters()">
              <option value="all">전체</option>
              <option value="today">오늘</option>
              <option value="week" selected>이번 주</option>
              <option value="month">이번 달</option>
              <option value="30d">최근 30일</option>
            </select>
          </div>
          <div class="form-group">
            <label>환자</label>
            <select class="form-input" id="filterPatient" onchange="applyFilters()">
              <option value="">전체</option>
            </select>
          </div>
          <div class="form-group">
            <label>상담사</label>
            <select class="form-input" id="filterAuthor" onchange="applyFilters()">
              <option value="">전체</option>
            </select>
          </div>
          <div class="form-group">
            <label>점수</label>
            <select class="form-input" id="filterScore" onchange="applyFilters()">
              <option value="all">전체</option>
              <option value="high">80점 이상</option>
              <option value="mid">60~79점</option>
              <option value="low">60점 미만</option>
              <option value="none">미평가</option>
            </select>
          </div>
          <div class="form-group" style="min-width:160px;">
            <label>🔍 검색 (환자명/발화)</label>
            <input type="text" class="form-input" id="filterSearch" placeholder="예: 임플란트, 불안" oninput="applyFiltersDebounced()">
          </div>
          <button class="btn btn-sm btn-primary" onclick="downloadCSV()">⬇️ CSV</button>
        </div>

        <!-- 세션 테이블 -->
        <div class="card" style="overflow:hidden;">
          <div class="table-wrap" style="overflow-x:auto;">
            <table class="review-table" id="reviewTable">
              <thead>
                <tr>
                  <th data-sort="startedAt">시작 일시</th>
                  <th data-sort="patientName">환자</th>
                  <th data-sort="author">상담사</th>
                  <th data-sort="durationSec">분</th>
                  <th data-sort="turnsCount">대화</th>
                  <th data-sort="coachCount">코칭</th>
                  <th data-sort="score">점수</th>
                  <th data-sort="readiness">준비도 변화</th>
                  <th>주제</th>
                </tr>
              </thead>
              <tbody id="reviewTbody">
                <tr><td colspan="9" class="empty-state">
                  <div class="spinner" style="margin:0 auto;"></div>
                  <p style="margin-top:10px; font-size:0.85rem;">세션 조회 중…</p>
                </td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <div style="padding:10px 6px; font-size:0.78rem; color:var(--text-tertiary); text-align:right;" id="pagingInfo"></div>
      </div>
    </div>
  </div>

  <!-- 상세 슬라이드 패널 -->
  <div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <div>
        <h3 id="detailTitle" style="margin:0;">세션 상세</h3>
        <div id="detailMeta" style="font-size:0.78rem; color:var(--text-tertiary); margin-top:3px;"></div>
      </div>
      <button class="btn btn-sm btn-secondary" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/qlrcq-framework.js"></script>
  <script src="js/dental-engines.js"></script>
  <script src="js/review-page.js"></script>
</body>
</html>
