<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상담AI통역 | Medvo</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E🌐%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/common.css">
  <style>
    .content { max-width: 900px !important; }

    /* ── 설정 화면 ── */
    #setupScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 32px;
    }
    .setup-card {
      background: var(--surface);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 40px 48px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }
    .setup-card h2 { font-size: 1.375rem; margin-bottom: 6px; }
    .setup-card .desc { color: var(--text-tertiary); font-size: 0.875rem; margin-bottom: 28px; }

    .lang-pair {
      display: grid;
      grid-template-columns: 1fr 48px 1fr;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .lang-col label { font-size: 0.8125rem; font-weight: 700; color: var(--text-secondary); display: block; margin-bottom: 6px; }
    .lang-arrow { text-align: center; font-size: 1.75rem; color: var(--primary); }
    .lang-select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--gray-300);
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      background: var(--surface);
      color: var(--text-primary);
      cursor: pointer;
    }
    .lang-select:focus { outline: none; border-color: var(--primary); }

    .start-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 1.0625rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .start-btn:hover { background: var(--primary-dark, #0052cc); }

    /* ── 대화 화면 ── */
    #chatScreen { display: none; }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      padding: 12px 20px;
      margin-bottom: 16px;
    }
    .chat-header .lang-info {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 1rem;
    }
    .lang-badge {
      padding: 4px 14px;
      border-radius: var(--radius-full);
      font-size: 0.875rem;
      font-weight: 700;
    }
    .lang-badge.patient { background: var(--primary-bg); color: var(--primary); }
    .lang-badge.staff { background: #f0fdf4; color: #16a34a; }
    .end-btn {
      padding: 6px 16px;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius-sm);
      background: transparent;
      font-size: 0.875rem;
      cursor: pointer;
      color: var(--text-secondary);
    }
    .end-btn:hover { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }

    /* 대화 기록 */
    .chat-log {
      background: var(--surface);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 20px;
      min-height: 300px;
      max-height: 420px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 16px;
    }
    .chat-empty-msg {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      font-size: 0.9rem;
      gap: 8px;
      padding: 40px 0;
    }

    .msg-block { display: flex; flex-direction: column; gap: 4px; }
    .msg-block.patient { align-items: flex-start; }
    .msg-block.staff   { align-items: flex-end; }

    .msg-who {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
      padding: 0 4px;
    }

    .msg-original {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 0.9375rem;
      line-height: 1.6;
    }
    .msg-block.patient .msg-original {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-bottom-left-radius: 4px;
    }
    .msg-block.staff .msg-original {
      background: var(--primary-bg);
      border: 1px solid var(--primary-light, #c7d9ff);
      border-bottom-right-radius: 4px;
    }

    .msg-translated {
      max-width: 80%;
      padding: 8px 16px;
      font-size: 0.875rem;
      line-height: 1.6;
      border-radius: var(--radius-sm);
    }
    .msg-block.patient .msg-translated {
      background: #f0fdf4;
      border: 1px dashed #bbf7d0;
      color: #16a34a;
      font-weight: 600;
      border-bottom-left-radius: 4px;
    }
    .msg-block.staff .msg-translated {
      background: #eff6ff;
      border: 1px dashed #bfdbfe;
      color: var(--primary);
      font-weight: 600;
      border-bottom-right-radius: 4px;
    }
    .msg-loading { color: var(--text-tertiary); font-style: italic; font-size: 0.875rem; }

    /* 입력 패널 (2분할) */
    .input-panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .input-panel {
      background: var(--surface);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .input-panel-header {
      padding: 10px 14px;
      font-size: 0.8125rem;
      font-weight: 700;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .input-panel.patient .input-panel-header { background: var(--primary-bg); color: var(--primary); }
    .input-panel.staff   .input-panel-header { background: #f0fdf4; color: #16a34a; }

    .input-panel textarea {
      width: 100%;
      padding: 12px 14px;
      border: none;
      resize: none;
      font-size: 0.9375rem;
      font-family: inherit;
      min-height: 80px;
      box-sizing: border-box;
      background: var(--surface);
      color: var(--text-primary);
    }
    .input-panel textarea:focus { outline: none; }
    .input-panel-footer {
      padding: 8px 12px;
      border-top: 1px solid var(--gray-100);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .input-hint { font-size: 0.75rem; color: var(--text-tertiary); }
    .translate-btn {
      padding: 7px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      color: #fff;
    }
    .input-panel.patient .translate-btn { background: var(--primary); }
    .input-panel.patient .translate-btn:hover { background: var(--primary-dark, #0052cc); }
    .input-panel.staff   .translate-btn { background: #16a34a; }
    .input-panel.staff   .translate-btn:hover { background: #15803d; }
    .translate-btn:disabled { background: var(--gray-300) !important; cursor: not-allowed; }

    @media (max-width: 640px) {
      .lang-pair { grid-template-columns: 1fr; }
      .lang-arrow { transform: rotate(90deg); }
      .input-panels { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-page="translate">
  <div class="layout" id="app">
    <div class="main">
      <header class="header">
        <div class="flex items-center gap-12">
          <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
          <span class="header-title">🌐 상담AI통역</span>
        </div>
        <div class="header-actions"><span id="sessionBadge"></span></div>
      </header>

      <div class="content">

        <!-- ① 설정 화면 -->
        <div id="setupScreen">
          <div class="setup-card">
            <h2>🌐 상담AI통역</h2>
            <p class="desc">언어를 선택하고 시작하면 환자와 직원의 대화를 실시간으로 번역합니다.</p>

            <div class="lang-pair">
              <div class="lang-col">
                <label>👤 환자 언어</label>
                <select id="patientLang" class="lang-select">
                  <option value="English">🇺🇸 English (영어)</option>
                  <option value="Chinese (Simplified)">🇨🇳 中文简体 (중국어 간체)</option>
                  <option value="Chinese (Traditional)">🇹🇼 中文繁體 (중국어 번체)</option>
                  <option value="Japanese">🇯🇵 日本語 (일본어)</option>
                  <option value="Spanish">🇪🇸 Español (스페인어)</option>
                  <option value="French">🇫🇷 Français (프랑스어)</option>
                  <option value="German">🇩🇪 Deutsch (독일어)</option>
                  <option value="Portuguese">🇧🇷 Português (포르투갈어)</option>
                  <option value="Russian">🇷🇺 Русский (러시아어)</option>
                  <option value="Arabic">🇸🇦 العربية (아랍어)</option>
                  <option value="Hindi">🇮🇳 हिन्दी (힌디어)</option>
                  <option value="Vietnamese">🇻🇳 Tiếng Việt (베트남어)</option>
                  <option value="Thai">🇹🇭 ภาษาไทย (태국어)</option>
                  <option value="Indonesian">🇮🇩 Bahasa Indonesia (인도네시아어)</option>
                  <option value="Malay">🇲🇾 Bahasa Melayu (말레이어)</option>
                  <option value="Filipino">🇵🇭 Filipino (필리핀어)</option>
                  <option value="Dutch">🇳🇱 Nederlands (네덜란드어)</option>
                  <option value="Italian">🇮🇹 Italiano (이탈리아어)</option>
                  <option value="Polish">🇵🇱 Polski (폴란드어)</option>
                  <option value="Turkish">🇹🇷 Türkçe (터키어)</option>
                  <option value="Ukrainian">🇺🇦 Українська (우크라이나어)</option>
                  <option value="Swedish">🇸🇪 Svenska (스웨덴어)</option>
                  <option value="Norwegian">🇳🇴 Norsk (노르웨이어)</option>
                  <option value="Danish">🇩🇰 Dansk (덴마크어)</option>
                  <option value="Finnish">🇫🇮 Suomi (핀란드어)</option>
                  <option value="Czech">🇨🇿 Čeština (체코어)</option>
                  <option value="Romanian">🇷🇴 Română (루마니아어)</option>
                  <option value="Hungarian">🇭🇺 Magyar (헝가리어)</option>
                  <option value="Greek">🇬🇷 Ελληνικά (그리스어)</option>
                  <option value="Hebrew">🇮🇱 עברית (히브리어)</option>
                </select>
              </div>
              <div class="lang-arrow">⇄</div>
              <div class="lang-col">
                <label>👩‍⚕️ 직원 언어</label>
                <select id="staffLang" class="lang-select">
                  <option value="Korean" selected>🇰🇷 한국어</option>
                  <option value="English">🇺🇸 English</option>
                  <option value="Japanese">🇯🇵 日本語</option>
                  <option value="Chinese (Simplified)">🇨🇳 中文简体</option>
                </select>
              </div>
            </div>

            <button class="start-btn" onclick="startSession()">🌐 번역 시작</button>
          </div>
        </div>

        <!-- ② 대화 화면 -->
        <div id="chatScreen">
          <!-- 헤더 바 -->
          <div class="chat-header">
            <div class="lang-info">
              <span class="lang-badge patient" id="badgePatient">🇺🇸 English</span>
              <span style="color:var(--text-tertiary); font-size:1.25rem;">⇄</span>
              <span class="lang-badge staff" id="badgeStaff">🇰🇷 한국어</span>
            </div>
            <button class="end-btn" onclick="endSession()">✕ 종료</button>
          </div>

          <!-- 대화 기록 -->
          <div class="chat-log" id="chatLog">
            <div class="chat-empty-msg" id="chatEmptyMsg">
              <div style="font-size:2.5rem;">💬</div>
              <div>아래 입력창에서 대화를 시작하세요</div>
              <div style="font-size:0.8rem;">환자와 직원이 각자 자신의 언어로 입력합니다</div>
            </div>
          </div>

          <!-- 입력 패널 (환자 / 직원 분리) -->
          <div class="input-panels">
            <!-- 환자 입력 -->
            <div class="input-panel patient">
              <div class="input-panel-header">
                👤 환자 입력 <span id="patientLangLabel" style="font-weight:400; opacity:0.7;">(English)</span>
              </div>
              <textarea id="patientInput" placeholder="환자가 자신의 언어로 입력..."
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();translate('patient');}"></textarea>
              <div class="input-panel-footer">
                <span class="input-hint">Enter 전송 · Shift+Enter 줄바꿈</span>
                <button class="translate-btn" id="patientSendBtn" onclick="translate('patient')">번역 →</button>
              </div>
            </div>

            <!-- 직원 입력 -->
            <div class="input-panel staff">
              <div class="input-panel-header">
                👩‍⚕️ 직원 입력 <span id="staffLangLabel" style="font-weight:400; opacity:0.7;">(한국어)</span>
              </div>
              <textarea id="staffInput" placeholder="직원이 자신의 언어로 입력..."
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();translate('staff');}"></textarea>
              <div class="input-panel-footer">
                <span class="input-hint">Enter 전송 · Shift+Enter 줄바꿈</span>
                <button class="translate-btn" id="staffSendBtn" onclick="translate('staff')">번역 →</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script>
    let patientLang = 'English';
    let staffLang = 'Korean';

    function startSession() {
      patientLang = document.getElementById('patientLang').value;
      staffLang = document.getElementById('staffLang').value;

      document.getElementById('badgePatient').textContent = '👤 ' + patientLang;
      document.getElementById('badgeStaff').textContent = '👩‍⚕️ ' + staffLang;
      document.getElementById('patientLangLabel').textContent = '(' + patientLang + ')';
      document.getElementById('staffLangLabel').textContent = '(' + staffLang + ')';
      document.getElementById('patientInput').placeholder = '환자가 ' + patientLang + '로 입력...';
      document.getElementById('staffInput').placeholder = '직원이 ' + staffLang + '로 입력...';

      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('chatScreen').style.display = 'block';
      document.getElementById('patientInput').focus();
    }

    function endSession() {
      if (document.getElementById('chatLog').children.length > 1) {
        if (!confirm('대화를 종료하고 언어 설정으로 돌아가시겠습니까?')) return;
      }
      document.getElementById('chatLog').innerHTML = `
        <div class="chat-empty-msg" id="chatEmptyMsg">
          <div style="font-size:2.5rem;">💬</div>
          <div>아래 입력창에서 대화를 시작하세요</div>
          <div style="font-size:0.8rem;">환자와 직원이 각자 자신의 언어로 입력합니다</div>
        </div>`;
      document.getElementById('patientInput').value = '';
      document.getElementById('staffInput').value = '';
      document.getElementById('chatScreen').style.display = 'none';
      document.getElementById('setupScreen').style.display = 'flex';
    }

    async function translate(who) {
      const isPatient = who === 'patient';
      const inputEl = document.getElementById(isPatient ? 'patientInput' : 'staffInput');
      const btnEl = document.getElementById(isPatient ? 'patientSendBtn' : 'staffSendBtn');
      const text = inputEl.value.trim();
      if (!text) return;

      const fromLang = isPatient ? patientLang : staffLang;
      const toLang   = isPatient ? staffLang   : patientLang;

      inputEl.value = '';
      btnEl.disabled = true;

      // 빈 화면 제거
      const empty = document.getElementById('chatEmptyMsg');
      if (empty) empty.remove();

      // 말풍선 추가
      const id = 'msg_' + Date.now();
      const log = document.getElementById('chatLog');
      const block = document.createElement('div');
      block.className = 'msg-block ' + who;
      block.innerHTML = `
        <div class="msg-who">${isPatient ? '👤 환자 · ' + fromLang : '👩‍⚕️ 직원 · ' + fromLang}</div>
        <div class="msg-original">${escHtml(text)}</div>
        <div class="msg-translated msg-loading" id="${id}">⏳ ${toLang}로 번역 중...</div>
      `;
      log.appendChild(block);
      log.scrollTop = log.scrollHeight;

      try {
        const res = await fetch('/api/ai-generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt: `You are a professional medical interpreter for a dental clinic.
Translate the following text from ${fromLang} to ${toLang}.
Output ONLY the translated text. No explanations, no quotes, no labels.

"${text}"`,
            options: { maxTokens: 500 }
          })
        });
        if (!res.ok) throw new Error('API 오류 ' + res.status);
        const data = await res.json();
        const translated = (data.text || '').trim() || '번역 결과 없음';

        const el = document.getElementById(id);
        if (el) {
          el.textContent = translated;
          el.classList.remove('msg-loading');
        }
      } catch (e) {
        const el = document.getElementById(id);
        if (el) { el.textContent = '번역 실패: ' + e.message; el.style.color = 'var(--danger)'; }
      } finally {
        btnEl.disabled = false;
        inputEl.focus();
        log.scrollTop = log.scrollHeight;
      }
    }

    function escHtml(s) {
      return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);
    }
  </script>
</body>
</html>
